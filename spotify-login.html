<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion Spotify</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }
    .card {
      width: min(92vw, 420px);
      background: rgba(0,0,0,0.6);
      border-radius: 18px;
      padding: 28px 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }
    h1 { margin-top: 0; font-size: 1.7rem; }
    p { color: #ddd; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: block;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    .green { background: #1db954; }
    .grey  { background: rgba(255,255,255,0.15); }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎵 Connexion Spotify</h1>
    <p>Connecte ton compte Spotify Premium pour que l'app puisse contrôler la lecture (pause quand une porte s'ouvre, reprise de l'ambiance).</p>
    <button class="btn green" onclick="login()">Se connecter à Spotify</button>
    <button class="btn grey"  onclick="location.href='index.html'">← Retour</button>
  </div>

  <script>
    const CLIENT_ID   = "a0be0072df274f70ab0c1ab08a66b890";
    const REDIRECT_URI = "https://ndrapeau77-sb.github.io/soundboard/spotify-callback.html";

    function rand(n) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      return Array.from({length: n}, () => chars[Math.floor(Math.random() * chars.length)]).join("");
    }

    async function sha256base64url(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return btoa(String.fromCharCode(...new Uint8Array(buf)))
        .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
    }

    async function login() {
      const verifier   = rand(128);
      const challenge  = await sha256base64url(verifier);
      localStorage.setItem("pkce_verifier", verifier);

      const params = new URLSearchParams({
        response_type:          "code",
        client_id:              CLIENT_ID,
        scope:                  "user-modify-playback-state user-read-playback-state",
        redirect_uri:           REDIRECT_URI,
        code_challenge_method:  "S256",
        code_challenge:         challenge,
      });
      location.href = "https://accounts.spotify.com/authorize?" + params;
    }
  </script>
</body>
</html>
