<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion Spotify</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    .card {
      width: min(92vw, 420px);
      background: rgba(0,0,0,0.55);
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.8rem;
    }

    p {
      margin-bottom: 20px;
      line-height: 1.4;
      color: #f1f1f1;
    }

    .btn {
      display: inline-block;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: #1db954;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
      margin-bottom: 12px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .secondary {
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Connexion Spotify 🔐</h1>
    <p>Connecte ton compte Spotify pour permettre à l'app de lancer, mettre sur pause et reprendre l'ambiance.</p>

    <button class="btn" onclick="login()">Se connecter à Spotify</button>
    <button class="btn secondary" onclick="goBack()">Retour à l'app</button>
  </div>

  <script>
    const clientId = "a0be0072df274f70ab0c1ab08a66b890";
    const redirectUri = "https://ndrapeau77-sb.github.io/soundboard/spotify-callback.html";

    function goBack() {
      window.location.href = "index.html";
    }

    function generateRandomString(length) {
      const possible = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let text = "";
      for (let i = 0; i < length; i++) {
        text += possible.charAt(Math.floor(Math.random() * possible.length));
      }
      return text;
    }

    async function generateCodeChallenge(codeVerifier) {
      const data = new TextEncoder().encode(codeVerifier);
      const digest = await window.crypto.subtle.digest("SHA-256", data);
      return btoa(String.fromCharCode(...new Uint8Array(digest)))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=+$/, "");
    }

    async function login() {
      const codeVerifier = generateRandomString(128);
      const codeChallenge = await generateCodeChallenge(codeVerifier);

      localStorage.setItem("code_verifier", codeVerifier);

      const scope = "user-modify-playback-state user-read-playback-state";

      const args = new URLSearchParams({
        response_type: "code",
        client_id: clientId,
        scope,
        redirect_uri: redirectUri,
        code_challenge_method: "S256",
        code_challenge: codeChallenge
      });

      window.location.href = `https://accounts.spotify.com/authorize?${args.toString()}`;
    }
  </script>

</body>
</html>
