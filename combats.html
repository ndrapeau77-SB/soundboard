<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Combats</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background: transparent;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 15px;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .btn {
      width: 100%;
      max-width: 220px;
      height: 260px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      text-decoration: none;
      border: none;
      padding: 0;
      background: transparent;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: transform 0.1s ease;
      display: block;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .btn span {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      padding: 14px 10px;
      box-sizing: border-box;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
      color: white;
      text-shadow: 2px 2px 6px rgba(0,0,0,1);
      background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.45), rgba(0,0,0,0));
      z-index: 2;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .app {
        padding: 16px;
      }

      .topbar {
        flex-wrap: wrap;
      }

      .topbar h1 {
        margin: 0;
        font-size: 32px;
      }

      .btn {
        height: 220px;
        max-width: 100%;
      }

      .btn span {
        font-size: 18px;
        padding: 12px 8px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Combats ⚔️</h1>
      <button onclick="parent.navigateTo('heros.html')" style="color:white;background:rgba(0,0,0,0.6);padding:10px 14px;border-radius:10px;font-weight:bold;border:none;cursor:pointer;font-size:1rem;white-space:nowrap;">← Retour</button>
    </div>

    <div class="grid">

      <!-- 🎲 DÉS ATTAQUE -->
      <button class="btn" onclick="playAttackDice()">
        <img src="des_tete.png" alt="Dés attaque">
        <span>Dés Attaque</span>
      </button>

      <!-- 🛡️ DÉS DÉFENSE -->
      <button class="btn" onclick="playDefenseDice()">
        <img src="des_bouclier.png" alt="Dés défense">
        <span>Dés Défense</span>
      </button>

      <!-- ✨ MAGIE -->
      <button class="btn" onclick="parent.navigateTo('magies.html')">
        <img src="magie.png" alt="Magie">
        <span>Magie ✨</span>
      </button>

      <!-- 🗡️ DAGUE -->
      <button class="btn" onclick="playDagger()">
        <img src="dague.png" alt="Dague">
        <span>Dague 🗡️</span>
      </button>

    </div>

  </div>

  <script src="audio-utils.js"></script>
  <script>
    const attackSounds = [
      "combat.mp3",
      "combat2.mp3",
      "combat3.mp3",
      "combat4.mp3",
      "combat5.mp3",
      "combat6.mp3"
    ];

    const defenseSounds = [
      "block1.mp3",
      "block2.mp3",
      "block3.mp3",
      "block4.mp3",
      "block5.mp3"
    ];

    let attackAudio = null;
    let defenseAudio = null;
    let daggerAudio = null;

    let lastAttackIndex = -1;
    let lastDefenseIndex = -1;

    function vibrate(pattern) {
      if ("vibrate" in navigator) {
        navigator.vibrate(pattern);
      }
    }

    function playAttackDice() {
      vibrate(40);

      let randomIndex;
      do {
        randomIndex = Math.floor(Math.random() * attackSounds.length);
      } while (randomIndex === lastAttackIndex && attackSounds.length > 1);

      lastAttackIndex = randomIndex;

      if (attackAudio) {
        attackAudio.pause();
        attackAudio.currentTime = 0;
      }

      attackAudio = new Audio(attackSounds[randomIndex]);
      attackAudio.play().catch(() => {});
    }

    function playDefenseDice() {
      vibrate(30);

      let randomIndex;
      do {
        randomIndex = Math.floor(Math.random() * defenseSounds.length);
      } while (randomIndex === lastDefenseIndex && defenseSounds.length > 1);

      lastDefenseIndex = randomIndex;

      if (defenseAudio) {
        defenseAudio.pause();
        defenseAudio.currentTime = 0;
      }

      defenseAudio = new Audio(defenseSounds[randomIndex]);
      defenseAudio.play().catch(() => {});
    }

    function playDagger() {
      vibrate(30);

      if (daggerAudio) {
        daggerAudio.pause();
        daggerAudio.currentTime = 0;
      }

      daggerAudio = new Audio("dague.mp3");
      daggerAudio.play().catch(() => {});
    }
  </script>

</body>
</html>
