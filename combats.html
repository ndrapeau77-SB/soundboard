<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Combats</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(5, 10, 20, 0.55), rgba(5, 10, 20, 0.75)),
        url("heroquestbackground.jpg") center/cover no-repeat fixed;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    .back-btn {
      background: rgba(20, 30, 50, 0.85);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
      justify-items: center;
    }

    .img-btn {
      position: relative;
      display: block;
      width: 100%;
      max-width: 320px;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      border: 2px solid rgba(255,255,255,0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      min-height: 240px;
      background: rgba(0,0,0,0.25);
      cursor: pointer;
    }

    .img-btn:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 14px 30px rgba(0,0,0,0.45);
    }

    .img-btn:active {
      transform: scale(0.98);
    }

    .img-btn img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }

    .img-btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.18));
      text-shadow: 0 2px 6px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,0.82);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .img-btn {
        max-width: 100%;
        min-height: 190px;
      }

      .img-btn img {
        height: 190px;
      }

      .img-btn span {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Combats ⚔️</h1>
      <button class="back-btn" onclick="parent.navigateTo('heros.html')">⬅ Retour</button>
    </div>

    <div class="grid">
      <button class="img-btn" onclick="playAttackDice()">
        <img src="des_tete.png" alt="Dés attaque">
        <span>Dés Attaque</span>
      </button>

      <button class="img-btn" onclick="playDefenseDice()">
        <img src="des_bouclier.png" alt="Dés défense">
        <span>Dés Défense</span>
      </button>

      <button class="img-btn" onclick="parent.navigateTo('magies.html')">
        <img src="magie.png" alt="Magie">
        <span>Magie ✨</span>
      </button>

      <button class="img-btn" onclick="playVictoire()">
        <img src="victoire.png" alt="Victoire">
        <span>Victoire 🏆</span>
      </button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const attackSounds = [
      "combat.mp3","combat2.mp3","combat3.mp3",
      "combat4.mp3","combat5.mp3","combat6.mp3"
    ];

    const defenseSounds = [
      "block1.mp3","block2.mp3","block3.mp3",
      "block4.mp3","block5.mp3"
    ];

    let audioContext = null;
    const audioBuffers = {};

    const DICE_GAIN = 2.0;
    const VICTOIRE_GAIN = 1.5;

    function getCtx() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    async function loadBuffer(file) {
      if (audioBuffers[file]) return audioBuffers[file];
      const ctx = getCtx();
      const response = await fetch(file);
      const arrayBuffer = await response.arrayBuffer();
      const buffer = await ctx.decodeAudioData(arrayBuffer);
      audioBuffers[file] = buffer;
      return buffer;
    }

    async function playAmplified(file, gain) {
      const ctx = getCtx();
      if (ctx.state === "suspended") await ctx.resume();

      const buffer = await loadBuffer(file);
      const source = ctx.createBufferSource();
      const gainNode = ctx.createGain();

      gainNode.gain.value = gain;
      source.buffer = buffer;
      source.connect(gainNode);
      gainNode.connect(ctx.destination);
      source.start(0);
    }

    let lastAttackIndex = -1;
    let lastDefenseIndex = -1;
    let toastTimer = null;

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
    }

    function vibrate(ms) {
      if ("vibrate" in navigator) navigator.vibrate(ms);
    }

    function pickRandom(arr, lastIdx) {
      if (arr.length === 1) return { file: arr[0], index: 0 };

      let idx;
      do {
        idx = Math.floor(Math.random() * arr.length);
      } while (idx === lastIdx);

      return { file: arr[idx], index: idx };
    }

    async function playAttackDice() {
      vibrate(40);
      const { file, index } = pickRandom(attackSounds, lastAttackIndex);
      lastAttackIndex = index;
      await playAmplified(file, DICE_GAIN).catch(() => {});
      showToast("⚔️ Attaque");
    }

    async function playDefenseDice() {
      vibrate(30);
      const { file, index } = pickRandom(defenseSounds, lastDefenseIndex);
      lastDefenseIndex = index;
      await playAmplified(file, DICE_GAIN).catch(() => {});
      showToast("🛡️ Défense");
    }

    async function playVictoire() {
      vibrate(30);

      if (parent && parent.stopAll) {
        parent.stopAll();
      }

      await playAmplified("victoire.mp3", VICTOIRE_GAIN).catch(() => {});
      showToast("🏆 Victoire !");
    }

    async function warmUp() {
      try {
        const ctx = getCtx();
        if (ctx.state === "suspended") await ctx.resume();

        [...attackSounds, ...defenseSounds, "victoire.mp3"]
          .forEach(f => loadBuffer(f).catch(() => {}));
      } catch (_) {}
    }

    window.addEventListener("touchstart", warmUp, { once: true });
    window.addEventListener("click", warmUp, { once: true });
  </script>
</body>
</html>
