<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Combats</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background: transparent;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 15px;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .btn {
      width: 100%;
      max-width: 220px;
      height: 260px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      border: none;
      padding: 0;
      background: transparent;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: transform 0.1s ease;
      display: block;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .btn span {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      padding: 14px 10px;
      box-sizing: border-box;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
      color: white;
      text-shadow: 2px 2px 6px rgba(0,0,0,1);
      background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.45), rgba(0,0,0,0));
      z-index: 2;
      pointer-events: none;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,0.82);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 480px) {
      .app {
        padding: 16px;
      }

      .topbar h1 {
        margin: 0;
        font-size: 32px;
      }

      .btn {
        height: 220px;
        max-width: 100%;
      }

      .btn span {
        font-size: 18px;
        padding: 12px 8px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Combats ⚔️</h1>
      <button onclick="parent.navigateTo('heros.html')" style="color:white;background:rgba(0,0,0,0.6);padding:10px 14px;border-radius:10px;font-weight:bold;border:none;cursor:pointer;font-size:1rem;white-space:nowrap;">
        ← Retour
      </button>
    </div>

    <div class="grid">
      <button class="btn" onclick="playAttackDice()">
        <img src="des_tete.png" alt="Dés attaque">
        <span>Dés Attaque</span>
      </button>

      <button class="btn" onclick="playDefenseDice()">
        <img src="des_bouclier.png" alt="Dés défense">
        <span>Dés Défense</span>
      </button>

      <button class="btn" onclick="parent.navigateTo('magies.html')">
        <img src="magie.png" alt="Magie">
        <span>Magie ✨</span>
      </button>

      <button class="btn" onclick="playVictoire()">
        <img src="victoire.png" alt="Dague">
        <span>Victoire 🏆</span>
      </button>
    </div>

  </div>

  <div id="toast"></div>

  <script src="audio-utils.js"></script>
  <script>
    const attackSounds = [
      "combat.mp3",
      "combat2.mp3",
      "combat3.mp3",
      "combat4.mp3",
      "combat5.mp3",
      "combat6.mp3"
    ];

    const defenseSounds = [
      "block1.mp3",
      "block2.mp3",
      "block3.mp3",
      "block4.mp3",
      "block5.mp3"
    ];

    let attackAudio = null;
    let defenseAudio = null;
    let victoireAudio = null;

    let lastAttackIndex = -1;
    let lastDefenseIndex = -1;
    let toastTimer = null;

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
    }

    function vibrate(pattern) {
      if ("vibrate" in navigator) {
        navigator.vibrate(pattern);
      }
    }

    async function playAttackDice() {
      vibrate(40);

      let randomIndex;
      do {
        randomIndex = Math.floor(Math.random() * attackSounds.length);
      } while (randomIndex === lastAttackIndex && attackSounds.length > 1);

      lastAttackIndex = randomIndex;

      await playManagedAudio("attackAudio", attackSounds[randomIndex], {
        volume: 1,
        fadeInDuration: 100,
        fadeOutDuration: 100
      }).catch(() => {});

      showToast("⚔️ Attaque");
    }

    async function playDefenseDice() {
      vibrate(30);

      let randomIndex;
      do {
        randomIndex = Math.floor(Math.random() * defenseSounds.length);
      } while (randomIndex === lastDefenseIndex && defenseSounds.length > 1);

      lastDefenseIndex = randomIndex;

      await playManagedAudio("defenseAudio", defenseSounds[randomIndex], {
        volume: 1,
        fadeInDuration: 100,
        fadeOutDuration: 100
      }).catch(() => {});

      showToast("🛡️ Défense");
    }

    async function playVictoire() {
      vibrate(30);

      await playManagedAudio("victoireAudio", "victoire.mp3", {
        volume: 1,
        fadeInDuration: 100,
        fadeOutDuration: 100
      }).catch(() => {});

      showToast("🏆 Victoire");
    }
  </script>

</body>
</html>
