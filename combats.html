<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Combats</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;

      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.85)),
        url('heroquestbackground.jpg');

      background-size: cover;
      background-position: center;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .btn {
      width: 100%;
      max-width: 220px;
      height: 260px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      text-decoration: none;
      border: none;
      padding: 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: transform 0.1s ease;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn span {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
    }

    @media (max-width: 480px) {
      .btn {
        height: 220px;
        max-width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Combats ⚔️</h1>
      <a href="heros.html">← Retour</a>
    </div>

    <div class="grid">

      <!-- 🎲 DES (SON) -->
      <button class="btn" onclick="playDice()">
        <img src="des.png">
        <span>Dés 🎲</span>
      </button>

      <!-- ✨ MAGIE (DOSSIER) -->
      <a class="btn" href="magie.html">
        <img src="magie.png">
        <span>Magie ✨</span>
      </a>

      <!-- 🗡️ DAGUE (SON) -->
      <button class="btn" onclick="playDagger()">
        <img src="dague.png">
        <span>Dague 🗡️</span>
      </button>

    </div>

  </div>

  <script>
    let diceAudio = null;
    let daggerAudio = null;

    function playDice() {
      if (diceAudio) {
        diceAudio.pause();
        diceAudio.currentTime = 0;
      }

      diceAudio = new Audio("des.mp3");
      diceAudio.play().catch(() => {});
    }

    function playDagger() {
      if (daggerAudio) {
        daggerAudio.pause();
        daggerAudio.currentTime = 0;
      }

      daggerAudio = new Audio("dague.mp3");
      daggerAudio.play().catch(() => {});
    }
  </script>

</body>
</html>
