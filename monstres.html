<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monstres - Hero Quest</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;

      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .app {
      max-width: 1100px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .back-btn {
      text-decoration: none;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      justify-items: center;
    }

    .sound-btn {
      position: relative;
      width: 100%;
      max-width: 170px;
      height: 250px;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      border: none;
      padding: 0;
      background: rgba(0,0,0,0.25);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    .sound-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .sound-btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 8px;
      font-weight: bold;
      font-size: 0.95rem;
      text-align: center;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.15));
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    .sound-btn:active {
      transform: scale(0.97);
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .sound-btn {
        height: 220px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Monstres</h1>
      <a class="back-btn" href="index.html">← Retour</a>
    </div>

    <div class="grid">

      <button class="sound-btn" onclick="playSound('rat')">
        <img src="rat.png">
        <span>Rat</span>
      </button>

      <button class="sound-btn" onclick="playSound('squelette')">
        <img src="squelette.png">
        <span>Squelette</span>
      </button>

      <button class="sound-btn" onclick="playSound('zombie')">
        <img src="zombie.png">
        <span>Zombie</span>
      </button>

      <button class="sound-btn" onclick="playSound('momie')">
        <img src="momie.png">
        <span>Momie</span>
      </button>

      <button class="sound-btn" onclick="playSound('gobelin')">
        <img src="gobelin.png">
        <span>Gobelin</span>
      </button>

      <button class="sound-btn" onclick="playSound('ogre')">
        <img src="ogre.png">
        <span>Ogre</span>
      </button>

      <button class="sound-btn" onclick="playSound('abomination')">
        <img src="abomination.png">
        <span>Abomination</span>
      </button>

      <button class="sound-btn" onclick="playSound('gargouille')">
        <img src="gargouille.png">
        <span>Gargouille</span>
      </button>

      <button class="sound-btn" onclick="playSound('dreadwarrior')">
        <img src="dreadwarrior.png">
        <span>Dread Warrior</span>
      </button>

      <button class="sound-btn" onclick="playSound('dragon')">
        <img src="dragon.png">
        <span>Dragon 🐉</span>
      </button>

    </div>

  </div>

  <!-- Sons -->
  <audio id="rat" src="rat.mp3" preload="auto"></audio>
  <audio id="squelette" src="squelette.mp3" preload="auto"></audio>
  <audio id="zombie" src="zombie.mp3" preload="auto"></audio>
  <audio id="momie" src="momie.mp3" preload="auto"></audio>
  <audio id="gobelin" src="gobelin.mp3" preload="auto"></audio>
  <audio id="ogre" src="ogre.mp3" preload="auto"></audio>
  <audio id="abomination" src="abomination.mp3" preload="auto"></audio>
  <audio id="gargouille" src="gargouille.mp3" preload="auto"></audio>
  <audio id="dreadwarrior" src="dreadwarrior.mp3" preload="auto"></audio>
  <audio id="dragon" src="dragon.mp3" preload="auto"></audio>

  <script>
    function playSound(id) {
      const sound = document.getElementById(id);
      if (!sound) return;

      sound.currentTime = 0;
      sound.play().catch(() => {});
    }
  </script>
</body>
</html>
