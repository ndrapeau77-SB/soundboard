<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monstres - Hero Quest</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background: transparent;
    }

    .app {
      max-width: 1100px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .back-btn {
      text-decoration: none;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      justify-items: center;
    }

    .sound-btn {
      position: relative;
      width: 100%;
      max-width: 170px;
      height: 250px;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      border: none;
      padding: 0;
      background: rgba(0,0,0,0.25);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    .sound-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .sound-btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 8px;
      font-weight: bold;
      font-size: 0.95rem;
      text-align: center;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.15));
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    .sound-btn:active {
      transform: scale(0.97);
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .sound-btn {
        height: 220px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Monstres</h1>
      <button class="back-btn" onclick="parent.navigateTo('zargon.html')" style="border:none;cursor:pointer;">← Retour</button>
    </div>

    <div class="grid">

      <button class="sound-btn" onclick="playSound('rat')">
        <img src="rat.png" alt="Rat">
        <span>Rat</span>
      </button>

      <button class="sound-btn" onclick="playSound('squelette')">
        <img src="squelette.png" alt="Squelette">
        <span>Squelette</span>
      </button>

      <button class="sound-btn" onclick="playSound('zombie')">
        <img src="zombie.png" alt="Zombie">
        <span>Zombie</span>
      </button>

      <button class="sound-btn" onclick="playSound('momie')">
        <img src="momie.png" alt="Momie">
        <span>Momie</span>
      </button>

      <button class="sound-btn" onclick="playSound('gobelin')">
        <img src="gobelin.png" alt="Gobelin">
        <span>Gobelin</span>
      </button>

      <button class="sound-btn" onclick="playSound('ogre')">
        <img src="ogre.png" alt="Ogre">
        <span>Ogre</span>
      </button>

      <button class="sound-btn" onclick="playSound('abomination')">
        <img src="abomination.png" alt="Abomination">
        <span>Abomination</span>
      </button>

      <button class="sound-btn" onclick="playSound('gargouille')">
        <img src="gargouille.png" alt="Gargouille">
        <span>Gargouille</span>
      </button>

      <button class="sound-btn" onclick="playSound('dreadwarrior')">
        <img src="dreadwarrior.png" alt="Dread Warrior">
        <span>Dread Warrior</span>
      </button>

      <button class="sound-btn" onclick="playSound('dragon')">
        <img src="dragon.png" alt="Dragon">
        <span>Dragon 🐉</span>
      </button>

    </div>

  </div>

  <script>
  const soundFiles = {
    rat: ["rat1.mp3", "rat2.mp3", "rat3.mp3", "rat4.mp3", "rat5.mp3"],
    squelette: ["monstre_squelette.mp3", "monstre_squelette2.mp3", "monstre_squelette3.mp3", "monstre_squelette4.mp3"],
    zombie: ["zombie1.mp3", "zombie2.mp3", "zombie3.mp3", "zombie4.mp3"],
    momie: ["momie1.mp3"],
    gobelin: ["monstre_goblin.mp3", "goblin1.mp3", "goblin2.mp3"],
    ogre: ["monstre_ord1.mp3", "monstre_orc2.mp3", "ogre.mp3"],
    abomination: ["abomination1.mp3", "abomination2.mp3"],
    gargouille: ["monstre_gargouille.mp3", "gargouille.mp3"],
    dreadwarrior: ["dread1.mp3", "dread2.mp3", "dread3.mp3", "dread4.mp3"],
    dragon: ["dragon.mp3"]
  };

  let audioContext = null;
  const audioBuffers = {};
  const lastPlayedIndex = {};

  function getAudioContext() {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioContext;
  }

  function pickRandomFile(id) {
    const files = soundFiles[id];
    if (!files || !files.length) return null;

    if (files.length === 1) return files[0];

    let randomIndex;
    do {
      randomIndex = Math.floor(Math.random() * files.length);
    } while (randomIndex === lastPlayedIndex[id]);

    lastPlayedIndex[id] = randomIndex;
    return files[randomIndex];
  }

  async function loadSoundBuffer(file) {
    if (audioBuffers[file]) return audioBuffers[file];

    const ctx = getAudioContext();
    const response = await fetch(file);
    const arrayBuffer = await response.arrayBuffer();
    const buffer = await ctx.decodeAudioData(arrayBuffer);
    audioBuffers[file] = buffer;
    return buffer;
  }

  async function playSound(id) {
    const file = pickRandomFile(id);
    if (!file) return;

    try {
      const ctx = getAudioContext();

      if (ctx.state === "suspended") {
        await ctx.resume();
      }

      const buffer = await loadSoundBuffer(file);

      const source = ctx.createBufferSource();
      const gainNode = ctx.createGain();

      gainNode.gain.value = 0.9;

      source.buffer = buffer;
      source.connect(gainNode);
      gainNode.connect(ctx.destination);

      source.start(0);
    } catch (error) {
      console.log("Erreur son :", error);
    }
  }

  async function warmUpAudio() {
    try {
      const ctx = getAudioContext();

      if (ctx.state === "suspended") {
        await ctx.resume();
      }

      const allFiles = Object.values(soundFiles).flat();
      for (const file of allFiles) {
        loadSoundBuffer(file).catch(() => {});
      }

      window.removeEventListener("touchstart", warmUpAudio);
      window.removeEventListener("click", warmUpAudio);
    } catch (_) {}
  }

  window.addEventListener("touchstart", warmUpAudio, { once: true });
  window.addEventListener("click", warmUpAudio, { once: true });
</script>
</body>
</html>
