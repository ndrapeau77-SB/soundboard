<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Musique / Ambiance</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;

      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');

      background-size: cover;
      background-position: center;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .back-btn {
      text-decoration: none;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      justify-items: center;
    }

    .sound-btn {
      position: relative;
      width: 100%;
      max-width: 180px;
      height: 260px;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      border: none;
      padding: 0;
      background: rgba(0,0,0,0.25);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    .sound-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sound-btn span {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      font-weight: bold;
      font-size: 1rem;
      color: #ffffff;
      background: rgba(0,0,0,0.65);
      border-radius: 10px;
      text-shadow: 0 2px 6px rgba(0,0,0,1);
    }

    .sound-btn:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Musique / Ambiance 🎵</h1>
      <a class="back-btn" href="heros.html">← Retour</a>
    </div>

    <div class="grid">

      <button class="sound-btn" onclick="playSound('choix1')">
        <img src="musique.png">
        <span>Donjon Calme</span>
      </button>

      <button class="sound-btn" onclick="playSound('choix2')">
        <img src="musique.png">
        <span>Combat intense</span>
      </button>

      <button class="sound-btn" onclick="playSound('choix3')">
        <img src="musique.png">
        <span>Exploration</span>
      </button>

    </div>

  </div>

  <script>
    const soundFiles = {
      choix1: "choix1.mp3",
      choix2: "choix2.mp3",
      choix3: "choix3.mp3"
    };

    let currentAudio = null;

    function playSound(id) {
      const file = soundFiles[id];
      if (!file) return;

      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      currentAudio = new Audio(file);
      currentAudio.play().catch(() => {});
    }
  </script>

</body>
</html>
