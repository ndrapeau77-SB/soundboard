<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ambiances - Hero Quest</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;

      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');

      background-size: cover;
      background-position: center;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .back-btn {
      text-decoration: none;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    /* 🔥 2 PAR LIGNE */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      justify-items: center;
    }

    .sound-btn {
      position: relative;
      width: 100%;
      max-width: 180px;
      height: 260px;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      border: none;
      padding: 0;
      background: rgba(0,0,0,0.25);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    .sound-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .sound-btn span {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px;
      text-align: center;
      font-weight: bold;
      font-size: 1rem;
      color: #ffffff;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
      text-shadow: 0 2px 6px rgba(0,0,0,1);
    }

    .sound-btn:active {
      transform: scale(0.97);
    }

  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Ambiances</h1>
      <a class="back-btn" href="index.html">← Retour</a>
    </div>

    <div class="grid">

      <button class="sound-btn" onclick="playSound('escaliers')">
        <img src="escaliers.png">
        <span>Escaliers</span>
      </button>

      <button class="sound-btn" onclick="playSound('chaines')">
        <img src="chaines.png">
        <span>Chaînes</span>
      </button>

      <button class="sound-btn" onclick="playSound('ratelier')">
        <img src="ratelier.png">
        <span>Râtelier</span>
      </button>

      <button class="sound-btn" onclick="playSound('bibliotheque')">
        <img src="bibliotheque.png">
        <span>Bibliothèque</span>
      </button>

    </div>

  </div>

  <!-- 🔥 MULTI-SON WEB AUDIO -->
  <script>
    const soundFiles = {
      escaliers: "escaliers.mp3",
      chaines: "chaines.mp3",
      ratelier: "ratelier.mp3",
      bibliotheque: "bibliotheque.mp3"
    };

    let audioContext = null;
    const audioBuffers = {};

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    async function loadSoundBuffer(file) {
      if (audioBuffers[file]) return audioBuffers[file];

      const ctx = getAudioContext();
      const response = await fetch(file);
      const arrayBuffer = await response.arrayBuffer();
      const buffer = await ctx.decodeAudioData(arrayBuffer);
      audioBuffers[file] = buffer;
      return buffer;
    }

    async function playSound(id) {
      const file = soundFiles[id];
      if (!file) return;

      try {
        const ctx = getAudioContext();

        if (ctx.state === "suspended") {
          await ctx.resume();
        }

        const buffer = await loadSoundBuffer(file);

        const source = ctx.createBufferSource();
        const gainNode = ctx.createGain();

        gainNode.gain.value = 1.0;

        source.buffer = buffer;
        source.connect(gainNode);
        gainNode.connect(ctx.destination);

        source.start(0);
      } catch (error) {
        console.log("Erreur son :", error);
      }
    }

    // précharge
    async function warmUpAudio() {
      try {
        const ctx = getAudioContext();
        if (ctx.state === "suspended") {
          await ctx.resume();
        }

        const files = Object.values(soundFiles);
        for (const file of files) {
          loadSoundBuffer(file).catch(() => {});
        }

        window.removeEventListener("touchstart", warmUpAudio);
        window.removeEventListener("click", warmUpAudio);
      } catch (_) {}
    }

    window.addEventListener("touchstart", warmUpAudio, { once: true });
    window.addEventListener("click", warmUpAudio, { once: true });
  </script>

</body>
</html>
