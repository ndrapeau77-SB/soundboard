<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héros</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .app {
      max-width: 980px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 2rem;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      background: rgba(0,0,0,0.65);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    /* Bouton Spotify relancer - centré au-dessus de la grille */
    .spotify-relancer {
      text-align: center;
      margin-bottom: 20px;
    }

    .spotify-relancer button {
      background: #1db954;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.35);
      transition: transform 0.1s ease;
    }

    .spotify-relancer button:active {
      transform: scale(0.96);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 220px));
      justify-content: center;
      gap: 24px 36px;
    }

    .btn {
      display: block;
      width: 100%;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.1s ease;
      background: rgba(0,0,0,0.25);
      border: none;
      padding: 0;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 1.05rem;
      color: #ffffff;
      background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.25));
      text-shadow: 0 2px 6px rgba(0,0,0,1);
      z-index: 2;
    }

    /* Toast notification discrète */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,0.82);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
        gap: 16px;
      }

      .btn {
        height: 220px;
      }

      .btn span {
        font-size: 0.95rem;
      }

      .topbar h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Héros ⚔️</h1>
      <a href="index.html">← Retour</a>
    </div>

    <!-- Bouton Relancer Spotify -->
    <div class="spotify-relancer">
      <button onclick="playSpotify()">🎵 Relancer Spotify</button>
    </div>

    <div class="grid">

      <a class="btn" href="combats.html">
        <img src="combats.png" alt="Combats">
        <span>Combats</span>
      </a>

      <a class="btn" href="pieges.html">
        <img src="pieges.png" alt="Pièges">
        <span>Pièges</span>
      </a>

      <!-- PORTE : arrête Spotify + joue son de porte -->
      <button class="btn" onclick="playDoor()">
        <img src="portes.png" alt="Portes">
        <span>Portes</span>
      </button>

      <!-- AMBIANCE : joue un son d'ambiance local (pas Spotify) -->
      <button class="btn" onclick="playAmbiance()">
        <img src="musique.png" alt="Ambiance">
        <span>Ambiance</span>
      </button>

    </div>

  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <script>
    const CLIENT_ID    = "a0be0072df274f70ab0c1ab08a66b890";
    const PLAYLIST_ID  = "3xaIM6iYEAGEOA7zCKd4lF";

    const doorSounds = ["porte1.mp3","porte2.mp3","porte3.mp3","porte4.mp3","porte5.m4a"];

    // ⬇️ Ajoute tes sons d'ambiance ici quand tu les auras
    const ambianceSounds = [
      // "ambiance1.mp3",
    ];

    let currentAudio = null;
    let toastTimer   = null;

    // ── Toast ──────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
    }

    function vibrate(ms) { if ("vibrate" in navigator) navigator.vibrate(ms); }

    // ── Gestion token Spotify ──────────────────────────────
    function getToken()   { return localStorage.getItem("sp_access")  || ""; }
    function getRefresh() { return localStorage.getItem("sp_refresh") || ""; }
    function getExpiry()  { return Number(localStorage.getItem("sp_expires") || 0); }

    function isLoggedIn() { return !!getToken(); }

    async function refreshToken() {
      const refresh = getRefresh();
      if (!refresh) return false;
      try {
        const res  = await fetch("https://accounts.spotify.com/api/token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            grant_type:    "refresh_token",
            refresh_token: refresh,
            client_id:     CLIENT_ID,
          }),
        });
        const data = await res.json();
        if (!data.access_token) return false;
        localStorage.setItem("sp_access",  data.access_token);
        localStorage.setItem("sp_expires", String(Date.now() + data.expires_in * 1000));
        if (data.refresh_token) localStorage.setItem("sp_refresh", data.refresh_token);
        return true;
      } catch { return false; }
    }

    // Renouvelle le token si expiré ou proche de l'expiration (2 min marge)
    async function ensureToken() {
      if (!getToken()) return false;
      if (Date.now() > getExpiry() - 120_000) {
        return await refreshToken();
      }
      return true;
    }

    // ── Appel API Spotify avec retry auto si 401 ───────────
    async function spotifyAPI(method, endpoint, body) {
      const valid = await ensureToken();
      if (!valid) return null;

      const opts = {
        method,
        headers: { Authorization: "Bearer " + getToken() },
      };
      if (body) {
        opts.headers["Content-Type"] = "application/json";
        opts.body = JSON.stringify(body);
      }

      let res = await fetch("https://api.spotify.com/v1" + endpoint, opts);

      // Token expiré → on rafraîchit et on réessaie une fois
      if (res.status === 401) {
        const ok = await refreshToken();
        if (!ok) return null;
        opts.headers.Authorization = "Bearer " + getToken();
        res = await fetch("https://api.spotify.com/v1" + endpoint, opts);
      }

      return res;
    }

    // ── Pause Spotify ──────────────────────────────────────
   async function pauseSpotify() {
  if (!isLoggedIn()) return false;
  try {
    const res = await spotifyAPI("PUT", "/me/player/pause");
    const status = res ? res.status : "null";
    showToast("Pause status: " + status);
    return res && (res.status === 204 || res.status === 200);
  } catch(e) {
    showToast("Erreur: " + e.message);
    return false;
  }
}

    // ── Play Spotify (relancer la playlist) ───────────────
    async function playSpotify() {
      if (!isLoggedIn()) {
        showToast("⚠️ Connecte Spotify d'abord");
        return;
      }
      showToast("🎵 Relance Spotify...");
      try {
        // Tente de reprendre la lecture en cours
        let res = await spotifyAPI("PUT", "/me/player/play");

        // Si pas de device actif (404/403) → relancer la playlist directement
        if (!res || res.status === 404 || res.status === 403) {
          res = await spotifyAPI("PUT", "/me/player/play", {
            context_uri: "spotify:playlist:" + PLAYLIST_ID,
          });
        }

        if (res && (res.status === 204 || res.status === 200)) {
          showToast("🎵 Spotify relancé !");
        } else {
          showToast("⚠️ Spotify ouvert — lance la playlist manuellement");
        }
      } catch {
        showToast("Erreur réseau Spotify");
      }
    }

    // ── Son local ──────────────────────────────────────────
    function playLocal(file) {
      if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
      currentAudio = new Audio(file);
      currentAudio.play().catch(() => {});
    }

    // ── Bouton Porte : pause Spotify + son de porte ────────
    async function playDoor() {
      vibrate(40);
      const file = doorSounds[Math.floor(Math.random() * doorSounds.length)];

      if (isLoggedIn()) {
        showToast("🚪 Porte...");
        // Pause Spotify en parallèle du son pour éviter le délai
        pauseSpotify();
        playLocal(file);
      } else {
        // Pas connecté → juste jouer le son
        showToast("🚪 Porte (Spotify non connecté)");
        playLocal(file);
      }
    }

    // ── Bouton Ambiance : son local ────────────────────────
    function playAmbiance() {
      vibrate(30);
      if (!ambianceSounds.length) {
        showToast("Aucun son d'ambiance configuré.");
        return;
      }
      const file = ambianceSounds[Math.floor(Math.random() * ambianceSounds.length)];
      showToast("🎵 Ambiance lancée.");
      playLocal(file);
    }

    // ── Vérif au chargement ────────────────────────────────
    window.addEventListener("load", () => {
      if (!isLoggedIn()) {
        showToast("⚠️ Spotify non connecté — appuie sur Connexion");
      } else {
        // Rafraîchit le token silencieusement si nécessaire
        ensureToken();
      }
    });
  </script>

</body>
</html>
