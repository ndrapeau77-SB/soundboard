<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héros</title>
  <style>
    :root {
      --page-pad-x: 14px;
      --page-pad-y: 12px;
      --topbar-gap: 10px;
      --grid-gap-x: 14px;
      --grid-gap-y: 14px;
      --btn-radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100dvh;
      background: transparent;
      padding-top: 90px;
      padding: var(--page-pad-y) var(--page-pad-x) 18px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      height: calc(100dvh - (var(--page-pad-y) * 2));
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: var(--topbar-gap);
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.9rem;
    }

    .back-btn {
      color: white;
      background: rgba(0,0,0,0.65);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--grid-gap-y) var(--grid-gap-x);
      justify-items: center;
    }

    .btn {
      width: 100%;
      max-width: 180px;
      height: min(24dvh, 180px);
      border-radius: var(--btn-radius);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      border: none;
      background: rgba(0,0,0,0.25);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn span {
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="page">
  <div class="topbar">
    <h1>Héros ⚔️</h1>
    <button class="back-btn" onclick="parent.navigateTo('accueil.html')">← Retour</button>
  </div>

  <div class="grid">

    <button class="btn" onclick="parent.navigateTo('combats.html')">
      <img src="combats.png"><span>Combats</span>
    </button>

    <button class="btn" onclick="parent.navigateTo('pieges.html')">
      <img src="pieges.png"><span>Pièges</span>
    </button>

    <button class="btn" onclick="playDoor()">
      <img src="portes.png"><span>Portes</span>
    </button>

    <button class="btn" onclick="playPlacement()">
      <img src="placement.png"><span>Placement</span>
    </button>

    <button class="btn" onclick="playTreasure()">
      <img src="tresor.png"><span>🧰 Cherche trésor</span>
    </button>

    <button class="btn" onclick="playReward()">
      <img src="recompense.png"><span>🎁 Récompense</span>
    </button>

  </div>
</div>

<script src="audio-utils.js"></script>
<script>

const doorSounds = ["porte1.mp3","porte2.mp3","porte3.mp3","porte4.mp3","porte5.m4a"];
const placementSounds = ["tick1.mp3","tick2.mp3","tick3.mp3","tick4.mp3"];
const rewardSounds = ["recompense1.mp3","recompense2.mp3","recompense3.mp3"];

let placementAudio = null;
let placementActive = false;
let lastPlacementIndex = -1;
let lastRewardIndex = -1;

// 🔥 PLACEMENT RANDOM (SEULE MODIF)
function playNextPlacement(){
  if(!placementActive) return;

  let randomIndex;
  do{
    randomIndex = Math.floor(Math.random()*placementSounds.length);
  }while(randomIndex===lastPlacementIndex && placementSounds.length>1);

  lastPlacementIndex = randomIndex;

  const file = placementSounds[randomIndex];

  if(placementAudio){
    placementAudio.pause();
    placementAudio.currentTime=0;
  }

  placementAudio = new Audio(file);
  placementAudio.onended = ()=>playNextPlacement();
  placementAudio.play().catch(()=>{});
}

function playPlacement(){
  if(placementActive){
    placementActive=false;
    if(placementAudio){
      placementAudio.pause();
      placementAudio.currentTime=0;
    }
    return;
  }

  placementActive=true;
  playNextPlacement();
}

function playDoor(){
  const file = doorSounds[Math.floor(Math.random()*doorSounds.length)];
  new Audio(file).play();
}

function playTreasure(){
  new Audio("tresor_cherche.mp3").play();
}

function playReward(){
  let idx;
  do{
    idx = Math.floor(Math.random()*rewardSounds.length);
  }while(idx===lastRewardIndex && rewardSounds.length>1);

  lastRewardIndex = idx;
  new Audio(rewardSounds[idx]).play();
}

</script>

</body>
</html>
