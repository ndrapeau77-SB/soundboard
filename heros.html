<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héros</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 20px;
    }

    .btn {
      position: relative;
      border: none;
      border-radius: 12px;
      overflow: hidden;
    }

    .btn img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .btn span {
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      background: rgba(0,0,0,0.7);
    }
  </style>
</head>

<body>
<div class="app">

<h1>Héros ⚔️</h1>

<div id="status"></div>

<div class="grid">

<a class="btn" href="combats.html">
<img src="combats.png"><span>Combats</span>
</a>

<a class="btn" href="pieges.html">
<img src="pieges.png"><span>Pièges</span>
</a>

<button class="btn" onclick="playDoor()">
<img src="portes.png"><span>Portes</span>
</button>

<button class="btn" onclick="playSpotify()">
<img src="musique.png"><span>Ambiance</span>
</button>

</div>

</div>

<script>
const clientId = "a0be0072df274f70ab0c1ab08a66b890";

const doorSounds=[
"porte1.mp3",
"porte2.mp3",
"porte3.mp3",
"porte4.mp3"
];

let audio=null;

function getToken(){
  return localStorage.getItem("access_token");
}

async function refreshSpotifyToken(){
  const refreshToken=localStorage.getItem("refresh_token");
  if(!refreshToken) return false;

  const res=await fetch("https://accounts.spotify.com/api/token",{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded"
    },
    body:new URLSearchParams({
      grant_type:"refresh_token",
      refresh_token:refreshToken,
      client_id:clientId
    })
  });

  const data=await res.json();

  if(!data.access_token) return false;

  localStorage.setItem("access_token",data.access_token);

  if(data.expires_in){
    localStorage.setItem("token_expires_at",Date.now()+data.expires_in*1000);
  }

  return true;
}

async function ensureValidToken(){
  const exp=localStorage.getItem("token_expires_at");
  if(!exp) return true;

  if(Date.now()>exp-60000){
    return await refreshSpotifyToken();
  }

  return true;
}

async function pauseSpotify(){
  if(!(await ensureValidToken())) return;

  const token=getToken();

  await fetch("https://api.spotify.com/v1/me/player/pause",{
    method:"PUT",
    headers:{
      Authorization:"Bearer "+token
    }
  });
}

async function playSpotify(){
  if(!(await ensureValidToken())){
    alert("Reconnecte Spotify");
    return;
  }

  const token=getToken();

  await fetch("https://api.spotify.com/v1/me/player/play",{
    method:"PUT",
    headers:{
      Authorization:"Bearer "+token
    }
  });
}

async function playDoor(){
  await pauseSpotify();

  if(audio){
    audio.pause();
    audio.currentTime=0;
  }

  const rand=Math.floor(Math.random()*doorSounds.length);
  audio=new Audio(doorSounds[rand]);
  audio.play();
}
</script>

</body>
</html>
