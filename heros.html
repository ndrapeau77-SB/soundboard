<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héros</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    .app {
      max-width: 980px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      background: rgba(0,0,0,0.65);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 220px));
      justify-content: center;
      gap: 24px 36px;
    }

    .btn {
      display: block;
      width: 100%;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      border: none;
      padding: 0;
      background: rgba(0,0,0,0.25);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .btn span {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
      text-shadow: 0 2px 6px rgba(0,0,0,1);
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
        gap: 16px;
      }

      .btn {
        height: 220px;
      }
    }
  </style>
</head>

<body>
<div class="app">

  <div class="topbar">
    <h1>Héros ⚔️</h1>
    <a href="index.html">← Retour</a>
  </div>

  <div class="grid">

    <a class="btn" href="combats.html">
      <img src="combats.png" alt="Combats">
      <span>Combats</span>
    </a>

    <a class="btn" href="pieges.html">
      <img src="pieges.png" alt="Pièges">
      <span>Pièges</span>
    </a>

    <button class="btn" onclick="playRandomDoor()">
      <img src="portes.png" alt="Portes">
      <span>Portes</span>
    </button>

    <button class="btn" onclick="playSpotify()">
      <img src="musique.png" alt="Ambiance">
      <span>Lancer / Repartir l'ambiance 🎵</span>
    </button>

  </div>

</div>

<script>
const doorSounds = [
  "porte1.mp3",
  "porte2.mp3",
  "porte3.mp3",
  "porte4.mp3",
  "porte5.m4a"
];

let doorAudio = null;
let lastIndex = -1;

function getToken() {
  return localStorage.getItem("access_token");
}

async function pauseSpotify() {
  const token = getToken();
  if (!token) return;

  try {
    await fetch("https://api.spotify.com/v1/me/player/pause", {
      method: "PUT",
      headers: {
        Authorization: "Bearer " + token
      }
    });
  } catch (e) {
    console.log("Pause Spotify error:", e);
  }
}

async function playSpotify() {
  const token = getToken();

  if (!token) {
    alert("Connecte-toi à Spotify d'abord");
    window.location.href = "spotify-login.html";
    return;
  }

  try {
    const response = await fetch("https://api.spotify.com/v1/me/player/play", {
      method: "PUT",
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (!response.ok && response.status !== 204) {
      const text = await response.text();
      console.log("Play Spotify error:", response.status, text);
    }
  } catch (e) {
    console.log("Play Spotify error:", e);
  }
}

async function playRandomDoor() {
  let randomIndex;

  do {
    randomIndex = Math.floor(Math.random() * doorSounds.length);
  } while (randomIndex === lastIndex && doorSounds.length > 1);

  lastIndex = randomIndex;
  const chosenSound = doorSounds[randomIndex];

  await pauseSpotify();

  if (doorAudio) {
    doorAudio.pause();
    doorAudio.currentTime = 0;
  }

  doorAudio = new Audio(chosenSound);
  doorAudio.volume = 1.0;
  doorAudio.play().catch(() => {});
}
</script>

</body>
</html>
