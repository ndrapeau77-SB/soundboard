<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Héros</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
    url('heroquestbackground.jpg');
  background-size: cover;
}

.app {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.btn {
  height: 250px;
  border-radius: 18px;
  overflow: hidden;
  position: relative;
}

.btn img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: rgba(0,0,0,0.4);
}

.btn span {
  position: absolute;
  bottom: 0;
  width: 100%;
  text-align: center;
  background: rgba(0,0,0,0.8);
  padding: 10px;
}
</style>
</head>

<body>
<div class="app">

<div class="topbar">
  <h1>Héros</h1>
  <a href="index.html">← Retour</a>
</div>

<div class="grid">

  <a class="btn" href="combat.html">
    <img src="combat.png">
    <span>Combat ⚔️</span>
  </a>

  <a class="btn" href="ambiances.html">
    <img src="ambiance.png">
    <span>Ambiance 🎵</span>
  </a>

  <a class="btn" href="porte.html">
    <img src="porte.png">
    <span>Porte 🚪</span>
  </a>

</div>

</div>
</body>
</html>
