<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héros</title>
  <style>
    :root {
      --page-pad-x: 14px;
      --page-pad-y: 12px;
      --topbar-gap: 10px;
      --grid-gap-x: 14px;
      --grid-gap-y: 14px;
      --btn-radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100dvh;
      background: transparent;
      padding-top: 90px;
      padding: var(--page-pad-y) var(--page-pad-x) 18px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      height: calc(100dvh - (var(--page-pad-y) * 2));
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: var(--topbar-gap);
      flex-wrap: wrap;
      flex: 0 0 auto;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.9rem;
      line-height: 1;
    }

    .back-btn {
      color: white;
      background: rgba(0,0,0,0.65);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--grid-gap-y) var(--grid-gap-x);
      justify-items: center;
      align-content: start;
      flex: 1 1 auto;
      min-height: 0;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 180px;
      height: min(24dvh, 180px);
      border-radius: var(--btn-radius);
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.1s ease;
      background: rgba(0,0,0,0.25);
      border: none;
      padding: 0;
    }

    .btn:active { transform: scale(0.97); }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 8px;
      text-align: center;
      font-weight: bold;
      font-size: 1rem;
      color: #ffffff;
      background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.25));
      text-shadow: 0 2px 6px rgba(0,0,0,1);
      z-index: 2;
    }

    #toast {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,0.82);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<div class="page">
<div class="topbar">
<h1>Héros ⚔️</h1>
<button class="back-btn" onclick="parent.navigateTo('accueil.html')">← Retour</button>
</div>

<div class="grid">

<button class="btn" onclick="parent.navigateTo('combats.html')">
<img src="combats.png"><span>Combats</span>
</button>

<button class="btn" onclick="parent.navigateTo('pieges.html')">
<img src="pieges.png"><span>Pièges</span>
</button>

<button class="btn" onclick="playDoor()">
<img src="portes.png"><span>Portes</span>
</button>

<button class="btn" onclick="playPlacement()">
<img src="placement.png"><span>Placement</span>
</button>

<button class="btn" onclick="playTreasure()">
<img src="tresor.png"><span>🧰 Cherche trésor</span>
</button>

<button class="btn" onclick="playReward()">
<img src="recompense.png"><span>🎁 Récompense</span>
</button>

</div>
</div>

<div id="toast"></div>

<script src="audio-utils.js"></script>
<script>

const placementSounds = [
"tick1.mp3","tick2.mp3","tick3.mp3","tick4.mp3"
];

let placementAudio = null;
let placementActive = false;
let lastPlacementIndex = -1;

function playNextPlacement() {
  if (!placementActive) return;

  let randomIndex;

  do {
    randomIndex = Math.floor(Math.random() * placementSounds.length);
  } while (randomIndex === lastPlacementIndex && placementSounds.length > 1);

  lastPlacementIndex = randomIndex;

  const file = placementSounds[randomIndex];

  if (placementAudio) {
    placementAudio.pause();
    placementAudio.currentTime = 0;
  }

  placementAudio = new Audio(file);

  placementAudio.onended = () => {
    playNextPlacement();
  };

  placementAudio.play().catch(()=>{});
}

function playPlacement(){
  if(placementActive){
    placementActive=false;
    if(placementAudio){
      placementAudio.pause();
      placementAudio.currentTime=0;
    }
    return;
  }

  placementActive=true;
  playNextPlacement();
}

</script>

</body>
</html>
