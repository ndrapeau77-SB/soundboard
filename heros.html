<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héros</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background: transparent;
      padding: 20px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar h1 { margin: 0; font-size: 2rem; }

    .back-btn {
      color: white;
      background: rgba(0,0,0,0.65);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 220px));
      justify-content: center;
      gap: 24px 36px;
    }

    .btn {
      display: block;
      width: 100%;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.1s ease;
      background: rgba(0,0,0,0.25);
      border: none;
      padding: 0;
    }

    .btn:active { transform: scale(0.97); }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 1.05rem;
      color: #ffffff;
      background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.25));
      text-shadow: 0 2px 6px rgba(0,0,0,1);
      z-index: 2;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,0.82);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
        gap: 16px;
      }
      .btn { height: 220px; }
      .btn span { font-size: 0.95rem; }
      .topbar h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>Héros ⚔️</h1>
    <button class="back-btn" onclick="parent.navigateTo('accueil.html')">← Retour</button>
  </div>

  <div class="grid">

    <button class="btn" onclick="parent.navigateTo('combats.html')">
      <img src="combats.png" alt="Combats">
      <span>Combats</span>
    </button>

    <button class="btn" onclick="parent.navigateTo('pieges.html')">
      <img src="pieges.png" alt="Pièges">
      <span>Pièges</span>
    </button>

    <button class="btn" onclick="playDoor()">
      <img src="portes.png" alt="Portes">
      <span>Portes</span>
    </button>

    <button class="btn" onclick="playPlacement()">
      <img src="placement.png" alt="Placement">
      <span>Placement</span>
    </button>

    <button class="btn" onclick="playTreasure()">
      <img src="tresor.png" alt="Cherche trésor">
      <span>🧰 Cherche trésor</span>
    </button>

    <button class="btn" onclick="playReward()">
      <img src="recompense.png" alt="Récompense">
      <span>🎁 Récompense</span>
    </button>

  </div>

  <div id="toast"></div>

  <script src="audio-utils.js"></script>
<script>

  const rewardSounds = [
    "recompense1.mp3",
    "recompense2.mp3",
    "recompense3.mp3"
  ];

  let lastRewardIndex = -1;

  async function playTreasure() {
    vibrate(40);

    await playManagedAudio("treasureAudio", "tresor.mp3", {
      volume: 1,
      fadeInDuration: 150,
      fadeOutDuration: 120
    }).catch(() => {});

    showToast("🧰 Trésor !");
  }

  async function playReward() {
    vibrate(40);

    let randomIndex;
    do {
      randomIndex = Math.floor(Math.random() * rewardSounds.length);
    } while (randomIndex === lastRewardIndex && rewardSounds.length > 1);

    lastRewardIndex = randomIndex;

    await playManagedAudio("rewardAudio", rewardSounds[randomIndex], {
      volume: 1,
      fadeInDuration: 180,
      fadeOutDuration: 120
    }).catch(() => {});

    showToast("🎁 Récompense !");
  }

  const doorSounds = [
    "porte1.mp3","porte2.mp3","porte3.mp3","porte4.mp3","porte5.m4a"
  ];

  const placementSounds = [
    "tick1.mp3",
    "tick2.mp3",
    "tick3.mp3",
    "tick4.mp3"
  ];

  let currentAudio = null;
  let placementAudio = null;

  let placementActive = false;
  let placementIndex = 0;

  let toastTimer = null;

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
  }

  function vibrate(ms) {
    if ("vibrate" in navigator) navigator.vibrate(ms);
  }

  function stopPlacement() {
    placementActive = false;
    if (placementAudio) {
      placementAudio.pause();
      placementAudio.currentTime = 0;
      placementAudio = null;
    }
  }

  function playNextPlacement() {
    if (!placementActive) return;

    const file = placementSounds[placementIndex];

    if (placementAudio) {
      placementAudio.pause();
      placementAudio.currentTime = 0;
    }

    placementAudio = new Audio(file);

    placementAudio.onended = () => {
      placementIndex = (placementIndex + 1) % placementSounds.length;
      playNextPlacement();
    };

    placementAudio.play().catch(() => {});
  }

  function playPlacement() {
    vibrate(25);

    if (placementActive) {
      stopPlacement();
      showToast("⛔ Placement arrêté");
      return;
    }

    placementActive = true;
    placementIndex = 0;
    playNextPlacement();
  }

  function playDoor() {
    vibrate(40);

    stopPlacement();

    const file = doorSounds[Math.floor(Math.random() * doorSounds.length)];
    playManagedAudio("currentAudio", file, {
      volume: 1,
      fadeInDuration: 120,
      fadeOutDuration: 120
    });

    showToast("🚪 Porte...");
  }

</script>

</body>
</html>
