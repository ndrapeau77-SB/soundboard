<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héros</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .app {
      max-width: 980px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 2rem;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      background: rgba(0,0,0,0.65);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 220px));
      justify-content: center;
      gap: 24px 36px;
    }

    .btn {
      display: block;
      width: 100%;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.1s ease;
      background: rgba(0,0,0,0.25);
      border: none;
      padding: 0;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 1.05rem;
      color: #ffffff;
      background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.25));
      text-shadow: 0 2px 6px rgba(0,0,0,1);
      z-index: 2;
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
        gap: 16px;
      }

      .btn {
        height: 220px;
      }

      .btn span {
        font-size: 0.95rem;
      }

      .topbar h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Héros ⚔️</h1>
      <a href="index.html">← Retour</a>
    </div>

    <div class="grid">

      <a class="btn" href="combats.html">
        <img src="combats.png" alt="Combats">
        <span>Combats</span>
      </a>

      <a class="btn" href="pieges.html">
        <img src="pieges.png" alt="Pièges">
        <span>Pièges</span>
      </a>

      <button class="btn" onclick="playRandomDoor()">
        <img src="portes.png" alt="Portes">
        <span>Portes</span>
      </button>

      <button class="btn" onclick="playRandomMusic()">
  <img src="musique.png" alt="Musique">
  <span>Musique </span>
</button>

      <button class="btn" onclick="playRandomMusic()">
  <img src="placement.png" alt="Musique">
  <span>Placement</span>
</button>

    </div>

  </div>

  <!-- Média principal caché -->
  <audio id="doorPlayer" preload="auto"></audio>

  <script>
    const doorSounds = [
      "porte1.mp3",
      "porte2.mp3",
      "porte3.mp3",
      "porte4.mp3",
      "porte5.m4a"
    ];

    const doorPlayer = document.getElementById("doorPlayer");
    let lastIndex = -1;

    function pickRandomDoorSound() {
      let randomIndex;

      do {
        randomIndex = Math.floor(Math.random() * doorSounds.length);
      } while (randomIndex === lastIndex && doorSounds.length > 1);

      lastIndex = randomIndex;
      return doorSounds[randomIndex];
    }

    function stopDoorSound() {
      doorPlayer.pause();
      doorPlayer.currentTime = 0;
      doorPlayer.removeAttribute("src");
      doorPlayer.load();
    }

    function playRandomDoor() {
      const chosenSound = pickRandomDoorSound();

      try {
        // Stoppe le son précédent
        stopDoorSound();

        // Force un nouveau média principal
        doorPlayer.src = chosenSound;
        doorPlayer.preload = "auto";
        doorPlayer.volume = 1.0;
        doorPlayer.muted = false;
        doorPlayer.loop = false;
        doorPlayer.autoplay = false;

        // Ne pas mettre playsinline ici pour laisser le système
        // gérer ça comme un média "prioritaire" si possible.

        // Recharge explicitement
        doorPlayer.load();

        const playPromise = doorPlayer.play();
        if (playPromise !== undefined) {
          playPromise.catch((error) => {
            console.log("Lecture impossible :", error);
          });
        }
      } catch (error) {
        console.log("Erreur audio :", error);
      }
    }
  </script>
  <script>
  const musicSounds = [
    "donjon.mp3",
    "combat.mp3",
    "exploration.mp3"
  ];

  let musicAudio = null;
  let lastMusicIndex = -1;

  function playRandomMusic() {
    let randomIndex;

    do {
      randomIndex = Math.floor(Math.random() * musicSounds.length);
    } while (randomIndex === lastMusicIndex && musicSounds.length > 1);

    lastMusicIndex = randomIndex;
    const chosenSound = musicSounds[randomIndex];

    if (musicAudio) {
      musicAudio.pause();
      musicAudio.currentTime = 0;
    }

    musicAudio = new Audio(chosenSound);
    musicAudio.preload = "auto";
    musicAudio.volume = 1.0;

    musicAudio.play().catch(() => {});
  }
</script>
</body>
</html>
