<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héros</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background: transparent;
      padding: 20px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar h1 { margin: 0; font-size: 2rem; }

    .topbar-btns {
      display: flex;
      gap: 8px;
    }

    .back-btn {
      color: white;
      background: rgba(0,0,0,0.65);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .stop-btn {
      color: white;
      background: rgba(180,0,0,0.8);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .back-btn:active, .stop-btn:active { transform: scale(0.95); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 220px));
      justify-content: center;
      gap: 24px 36px;
    }

    .btn {
      display: block;
      width: 100%;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.1s ease;
      background: rgba(0,0,0,0.25);
      border: none;
      padding: 0;
    }

    .btn:active { transform: scale(0.97); }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 1.05rem;
      color: #ffffff;
      background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.25));
      text-shadow: 0 2px 6px rgba(0,0,0,1);
      z-index: 2;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,0.82);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
        gap: 16px;
      }
      .btn { height: 220px; }
      .btn span { font-size: 0.95rem; }
      .topbar h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>Héros ⚔️</h1>
    <div class="topbar-btns">
      <button class="stop-btn" onclick="stopEverything()">⏹ Arrêter tout</button>
      <button class="back-btn" onclick="parent.navigateTo('accueil.html')">← Retour</button>
    </div>
  </div>

  <div class="grid">

    <button class="btn" onclick="parent.navigateTo('combats.html')">
      <img src="combats.png" alt="Combats">
      <span>Combats</span>
    </button>

    <button class="btn" onclick="parent.navigateTo('pieges.html')">
      <img src="pieges.png" alt="Pièges">
      <span>Pièges</span>
    </button>

    <button class="btn" onclick="playDoor()">
      <img src="portes.png" alt="Portes">
      <span>Portes</span>
    </button>

    <button class="btn" onclick="playPlacement()">
      <img src="placement.png" alt="Placement">
      <span>Placement</span>
    </button>

    <button class="btn" onclick="playTreasure()">
      <img src="tresor.png" alt="Cherche trésor">
      <span>🧰 Cherche trésor</span>
    </button>

    <button class="btn" onclick="playReward()">
      <img src="recompense.png" alt="Récompense">
      <span>🎁 Récompense</span>
    </button>

  </div>

  <div id="toast"></div>

  <script>
    // ── Sons ──────────────────────────────────────────────
    const rewardSounds = [
      "recompense1.mp3",
      "recompense2.mp3",
      "recompense3.mp3"
    ];

    const doorSounds = [
      "porte1.mp3","porte2.mp3","porte3.mp3","porte4.mp3","porte5.m4a"
    ];

    const placementSounds = [
      "tick1.mp3","tick2.mp3","tick3.mp3","tick4.mp3"
    ];

    // ── État ──────────────────────────────────────────────
    let lastRewardIndex  = -1;
    let lastPlacementIdx = -1;

    let currentAudio   = null;   // porte / trésor / récompense
    let placementAudio = null;
    let placementActive = false;

    let toastTimer     = null;
    let duckTimeout    = null;

    const DUCK_VOLUME   = 0.15;
    const NORMAL_VOLUME = 0.8;
    const FADE_STEPS    = 20;
    const FADE_MS       = 200;

    // ── Ducking parent ────────────────────────────────────
    function duckParent(targetVolume, durationMs) {
      if (!parent || !parent.setMusicVolume) return;
      const steps    = FADE_STEPS;
      const interval = durationMs / steps;
      const current  = parent.getMusicVolume ? parent.getMusicVolume() : NORMAL_VOLUME;
      const delta    = (targetVolume - current) / steps;
      let step = 0;
      const timer = setInterval(() => {
        step++;
        const vol = Math.min(1, Math.max(0, current + delta * step));
        parent.setMusicVolume(vol);
        if (step >= steps) clearInterval(timer);
      }, interval);
    }

    function restoreParent() {
      clearTimeout(duckTimeout);
      duckParent(NORMAL_VOLUME, FADE_MS * 2);
    }

    // ── Utilitaires ───────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
    }

    function vibrate(ms) {
      if ("vibrate" in navigator) navigator.vibrate(ms);
    }

    function pickRandom(arr, lastIdx) {
      if (arr.length === 1) return { file: arr[0], index: 0 };
      let idx;
      do { idx = Math.floor(Math.random() * arr.length); }
      while (idx === lastIdx);
      return { file: arr[idx], index: idx };
    }

    // Stoppe currentAudio proprement
    function stopCurrent() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
    }

    // ── Placement ─────────────────────────────────────────
    function stopPlacement() {
      placementActive = false;
      if (placementAudio) {
        placementAudio.pause();
        placementAudio.currentTime = 0;
        placementAudio = null;
      }
    }

    function playNextPlacement() {
      if (!placementActive) return;

      const { file, index } = pickRandom(placementSounds, lastPlacementIdx);
      lastPlacementIdx = index;

      if (placementAudio) {
        placementAudio.pause();
        placementAudio.currentTime = 0;
      }

      placementAudio = new Audio(file);
      placementAudio.volume = 1;
      placementAudio.onended = () => playNextPlacement();
      placementAudio.play().catch(() => {});
    }

    function playPlacement() {
      vibrate(25);

      if (placementActive) {
        stopPlacement();
        showToast("⛔ Placement arrêté");
        return;
      }

      // Stoppe tout (parent + sons locaux) avant de lancer le placement
      stopCurrent();
      if (parent && parent.stopAll) parent.stopAll();

      placementActive = true;
      playNextPlacement();
      showToast("🎲 Placement...");
    }

    // ── Porte ─────────────────────────────────────────────
    function playDoor() {
      vibrate(40);

      stopPlacement();
      stopCurrent();
      if (parent && parent.stopAll) parent.stopAll();

      const { file } = pickRandom(doorSounds, -1);
      currentAudio = new Audio(file);
      currentAudio.volume = 1;
      currentAudio.play().catch(() => {});

      showToast("🚪 Porte...");
    }

    // ── Trésor ────────────────────────────────────────────
    function playTreasure() {
      vibrate(40);

      stopPlacement();
      stopCurrent();

      duckParent(DUCK_VOLUME, FADE_MS);

      currentAudio = new Audio("tresor_cherche.mp3");
      currentAudio.volume = 1;

      currentAudio.onended = () => {
        currentAudio = null;
        restoreParent();
      };

      currentAudio.play().catch(() => {});

      // Sécurité restore après 15s
      duckTimeout = setTimeout(restoreParent, 15000);

      showToast("🧰 Trésor !");
    }

    // ── Récompense ────────────────────────────────────────
    function playReward() {
      vibrate(40);

      stopPlacement();
      stopCurrent();

      const { file, index } = pickRandom(rewardSounds, lastRewardIndex);
      lastRewardIndex = index;

      duckParent(DUCK_VOLUME, FADE_MS);

      currentAudio = new Audio(file);
      currentAudio.volume = 1;

      currentAudio.onended = () => {
        currentAudio = null;
        restoreParent();
      };

      currentAudio.play().catch(() => {});

      // Sécurité restore après 15s
      duckTimeout = setTimeout(restoreParent, 15000);

      showToast("🎁 Récompense !");
    }

    // ── Stop global ───────────────────────────────────────

    /* Appelée par index.html via stopAll() */
    function stopAllLocal() {
      stopPlacement();
      stopCurrent();
      clearTimeout(duckTimeout);
    }

    /* Bouton ⏹ Arrêter tout */
    function stopEverything() {
      stopAllLocal();
      if (parent && parent.stopAll) parent.stopAll();
      showToast("⏹ Tout arrêté");
    }
  </script>

</body>
</html>
