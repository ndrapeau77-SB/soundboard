<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héros</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;

      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');

      background-size: cover;
      background-position: center;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 220px;
      height: 260px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: rgba(0,0,0,0.4);
    }

    .btn span {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Héros ⚔️</h1>
      <a href="index.html">← Retour</a>
    </div>

    <div class="grid">

      <a class="btn" href="combats.html">
        <img src="combats.png">
        <span>Combats</span>
      </a>

      <a class="btn" href="ambiances.html">
        <img src="ambiances.png">
        <span>Ambiance</span>
      </a>

      <!-- 🔥 BOUTON PORTE RANDOM -->
      <div class="btn" onclick="playRandomDoor()">
        <img src="portes.png">
        <span>Portes</span>
      </div>

      <a class="btn" href="pieges.html">
        <img src="pieges.png">
        <span>Pièges</span>
      </a>

    </div>

  </div>

  <!-- 🔊 SCRIPT SON PORTE RANDOM -->
  <script>
    const doorSounds = [
      "porte1.mp3",
      "porte2.mp3",
      "porte3.mp3",
      "porte4.mp3",
      "porte5.m4a"
    ];

    let doorAudio = null;
    let lastIndex = -1;

    function playRandomDoor() {

      let randomIndex;

      // 🔥 éviter répétition
      do {
        randomIndex = Math.floor(Math.random() * doorSounds.length);
      } while (randomIndex === lastIndex);

      lastIndex = randomIndex;

      const chosenSound = doorSounds[randomIndex];

      // stop si un son joue déjà
      if (doorAudio) {
        doorAudio.pause();
        doorAudio.currentTime = 0;
      }

      doorAudio = new Audio(chosenSound);
      doorAudio.preload = "auto";
      doorAudio.volume = 1.0;

      doorAudio.play().catch(() => {});
    }
  </script>

</body>
</html>
