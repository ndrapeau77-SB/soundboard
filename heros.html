<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héros</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    .app {
      max-width: 980px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      background: rgba(0,0,0,0.65);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 220px));
      justify-content: center;
      gap: 24px 36px;
    }

    .btn {
      display: block;
      width: 100%;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      border: none;
      padding: 0;
      background: rgba(0,0,0,0.25);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .btn span {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
      text-shadow: 0 2px 6px rgba(0,0,0,1);
    }

    .status {
      margin: 0 auto 20px;
      max-width: 520px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
        gap: 16px;
      }

      .btn {
        height: 220px;
      }
    }
  </style>
</head>

<body>
<div class="app">

  <div class="topbar">
    <h1>Héros ⚔️</h1>
    <a href="index.html">← Retour</a>
  </div>

  <div id="status" class="status">Prêt.</div>

  <div class="grid">

    <a class="btn" href="combats.html">
      <img src="combats.png" alt="Combats">
      <span>Combats</span>
    </a>

    <a class="btn" href="pieges.html">
      <img src="pieges.png" alt="Pièges">
      <span>Pièges</span>
    </a>

    <button class="btn" onclick="playRandomDoor()">
      <img src="portes.png" alt="Portes">
      <span>Portes</span>
    </button>

    <button class="btn" onclick="playSpotify()">
      <img src="musique.png" alt="Ambiance">
      <span>Lancer / Repartir l'ambiance 🎵</span>
    </button>

  </div>

</div>

<script>
const doorSounds = [
  "porte1.mp3",
  "porte2.mp3",
  "porte3.mp3",
  "porte4.mp3",
  "porte5.m4a"
];

let doorAudio = null;
let lastIndex = -1;
const statusEl = document.getElementById("status");

function setStatus(message) {
  statusEl.textContent = message;
}

function getToken() {
  return localStorage.getItem("access_token");
}

function clearSpotifySession() {
  localStorage.removeItem("access_token");
  localStorage.removeItem("refresh_token");
}

function redirectToSpotifyLogin(message = "Session Spotify expirée. Reconnecte-toi.") {
  setStatus(message);
  setTimeout(() => {
    window.location.href = "spotify-login.html";
  }, 800);
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function spotifyFetch(url, options = {}) {
  const token = getToken();

  if (!token) {
    redirectToSpotifyLogin("Connecte-toi à Spotify d'abord.");
    throw new Error("Token Spotify absent");
  }

  const response = await fetch(url, {
    ...options,
    headers: {
      ...(options.headers || {}),
      Authorization: "Bearer " + token
    }
  });

  if (response.status === 401) {
    clearSpotifySession();
    redirectToSpotifyLogin("Session Spotify expirée. Reconnecte-toi.");
    throw new Error("The access token expired");
  }

  if (response.status === 403) {
    throw new Error("Ce compte Spotify n'est pas autorisé pour cette application.");
  }

  return response;
}

async function getAvailableDevices() {
  const response = await spotifyFetch("https://api.spotify.com/v1/me/player/devices");

  if (!response.ok) {
    const text = await response.text();
    throw new Error("Devices " + response.status + " " + text);
  }

  const data = await response.json();
  return data.devices || [];
}

async function ensurePlaybackDevice() {
  const devices = await getAvailableDevices();

  if (!devices.length) {
    throw new Error("Aucun appareil Spotify disponible. Ouvre Spotify sur ton téléphone et lance une chanson une fois.");
  }

  const activeDevice = devices.find(device => device.is_active);
  if (activeDevice) {
    return activeDevice.id;
  }

  const fallbackDevice = devices.find(device => !device.is_restricted) || devices[0];

  const transferResponse = await spotifyFetch("https://api.spotify.com/v1/me/player", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      device_ids: [fallbackDevice.id],
      play: false
    })
  });

  if (!transferResponse.ok && transferResponse.status !== 204) {
    const text = await transferResponse.text();
    throw new Error("Transfer " + transferResponse.status + " " + text);
  }

  await sleep(500);
  return fallbackDevice.id;
}

async function pauseSpotify() {
  try {
    await ensurePlaybackDevice();

    const response = await spotifyFetch("https://api.spotify.com/v1/me/player/pause", {
      method: "PUT"
    });

    if (response.status === 204) {
      setStatus("Spotify mis en pause.");
      return true;
    }

    if (!response.ok) {
      const text = await response.text();
      throw new Error("Pause " + response.status + " " + text);
    }

    setStatus("Commande pause envoyée.");
    return true;
  } catch (e) {
    setStatus("Pause Spotify impossible : " + e.message);
    console.log(e);
    return false;
  }
}

async function playSpotify() {
  try {
    const deviceId = await ensurePlaybackDevice();

    const response = await spotifyFetch(
      `https://api.spotify.com/v1/me/player/play?device_id=${encodeURIComponent(deviceId)}`,
      { method: "PUT" }
    );

    if (response.status === 204) {
      setStatus("Spotify relancé.");
      return;
    }

    if (!response.ok) {
      const text = await response.text();
      throw new Error("Play " + response.status + " " + text);
    }

    setStatus("Commande play envoyée.");
  } catch (e) {
    setStatus("Play Spotify impossible : " + e.message);
    console.log(e);
  }
}

async function playRandomDoor() {
  let randomIndex;

  do {
    randomIndex = Math.floor(Math.random() * doorSounds.length);
  } while (randomIndex === lastIndex && doorSounds.length > 1);

  lastIndex = randomIndex;
  const chosenSound = doorSounds[randomIndex];

  await pauseSpotify();

  if (doorAudio) {
    doorAudio.pause();
    doorAudio.currentTime = 0;
  }

  doorAudio = new Audio(chosenSound);
  doorAudio.preload = "auto";
  doorAudio.volume = 1.0;

  try {
    await doorAudio.play();
    setStatus("Son de porte : " + chosenSound);
  } catch (e) {
    setStatus("Lecture du son impossible : " + e.message);
    console.log(e);
  }
}
</script>

</body>
</html>
