<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magie - Eau</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(5, 10, 20, 0.55), rgba(5, 10, 20, 0.75)),
        url("images/heroquestbackground.jpg") center/cover no-repeat fixed;
    }
    .app {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 32px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }
    .back-btn {
      background: rgba(20, 30, 50, 0.85);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: bold;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
      justify-items: center;
    }
    .sound-btn {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      border: 2px solid rgba(255,255,255,0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      min-height: 190px;
      background: rgba(0,0,0,0.25);
      width: 100%;
    }
    .sound-btn:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 14px 30px rgba(0,0,0,0.45);
    }
    .sound-btn.playing {
      box-shadow: 0 0 0 3px #f97316, 0 14px 30px rgba(0,0,0,0.45);
    }
    .sound-btn img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
    }
    .sound-btn span {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 14px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.18));
      text-shadow: 0 2px 6px rgba(0,0,0,0.8);
    }
    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 14px; }
      .sound-btn, .sound-btn img { min-height: 150px; height: 150px; }
      .sound-btn span { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Eau</h1>
      <button class="back-btn" onclick="window.location.href='magies.html'">⬅ Retour</button>
    </div>
    <div class="grid">

      <div class="sound-btn" onclick="playSound('https://ndrapeau77-sb.github.io/soundboard/eau_veil.mp3', 1.5, this)">
        <img src="spell_veil.png" alt="Veil of Mist">
        <span>Veil of Mist</span>
      </div>

      <div class="sound-btn" onclick="playSound('https://ndrapeau77-sb.github.io/soundboard/eau_healing.mp3', 2.0, this)">
        <img src="spell_waterhealing.png" alt="Water of Healing">
        <span>Water of Healing</span>
      </div>

      <div class="sound-btn" onclick="playSound('https://ndrapeau77-sb.github.io/soundboard/eau_sleep.mp3', 1.5, this)">
        <img src="spell_sleep.png" alt="Sleep">
        <span>Sleep</span>
      </div>

    </div>
  </div>

  <script>
    let audioContext = null;
    const audioBuffers = {};
    let activeSource = null;
    let activeBtn    = null;
    let duckTimeout  = null;

    const DUCK_VOLUME   = 0.15;
    const NORMAL_VOLUME = 0.8;
    const FADE_STEPS    = 20;
    const FADE_MS       = 200;

    function getCtx() {
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      return audioContext;
    }

    async function loadBuffer(url) {
      if (audioBuffers[url]) return audioBuffers[url];
      const ctx = getCtx();
      const response = await fetch(url);
      const arrayBuffer = await response.arrayBuffer();
      const buffer = await ctx.decodeAudioData(arrayBuffer);
      audioBuffers[url] = buffer;
      return buffer;
    }

    function duckParent(targetVolume, durationMs) {
      try {
        if (!parent || !parent.setMusicVolume) return;
        const steps    = FADE_STEPS;
        const interval = durationMs / steps;
        const current  = parent.getMusicVolume ? parent.getMusicVolume() : NORMAL_VOLUME;
        const delta    = (targetVolume - current) / steps;
        let step = 0;
        const timer = setInterval(() => {
          step++;
          const vol = Math.min(1, Math.max(0, current + delta * step));
          parent.setMusicVolume(vol);
          if (step >= steps) clearInterval(timer);
        }, interval);
      } catch(e) {}
    }

    function restoreParent() {
      clearTimeout(duckTimeout);
      duckParent(NORMAL_VOLUME, FADE_MS * 2);
    }

    function clearActiveBtn() {
      if (activeBtn) { activeBtn.classList.remove("playing"); activeBtn = null; }
    }

    function stopActiveSource() {
      if (activeSource) { try { activeSource.stop(); } catch(e) {} activeSource = null; }
      clearActiveBtn();
      clearTimeout(duckTimeout);
    }

    async function playSound(url, gain, btn) {
      try {
        const ctx = getCtx();
        if (ctx.state === "suspended") await ctx.resume();

        stopActiveSource();

        const buffer   = await loadBuffer(url);
        const source   = ctx.createBufferSource();
        const gainNode = ctx.createGain();
        gainNode.gain.value = gain;
        source.buffer = buffer;
        source.connect(gainNode);
        gainNode.connect(ctx.destination);

        duckParent(DUCK_VOLUME, FADE_MS);

        activeSource = source;
        activeBtn    = btn;
        btn.classList.add("playing");

        source.onended = () => {
          activeSource = null;
          clearActiveBtn();
          restoreParent();
        };

        source.start(0);
        duckTimeout = setTimeout(() => { restoreParent(); clearActiveBtn(); }, 15000);
      } catch(e) { console.error("Erreur audio :", e); }
    }

    async function warmUp() {
      try { const ctx = getCtx(); if (ctx.state === "suspended") await ctx.resume(); } catch(_) {}
    }
    window.addEventListener("touchstart", warmUp, { once: true });
    window.addEventListener("click",      warmUp, { once: true });
  </script>
</body>
</html>
