<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magie - Eau</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(5, 10, 20, 0.55), rgba(5, 10, 20, 0.75)),
        url("images/heroquestbackground.jpg") center/cover no-repeat fixed;
    }

    .app {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    .back-btn {
      background: rgba(20, 30, 50, 0.85);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .sound-btn {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      transition: 0.2s;
      height: 220px;
    }

    .sound-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 14px 30px rgba(0,0,0,0.45);
    }

    .sound-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sound-btn span {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 10px;
      text-align: center;
      font-weight: bold;
      background: rgba(0,0,0,0.6);
    }

    @media (max-width: 700px) {
      .sound-btn {
        height: 160px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Eau</h1>
      <button class="back-btn" onclick="window.location.href='magies.html'">⬅ Retour</button>
    </div>

    <div class="grid">
      <div class="sound-btn" onclick="playAudioById('veil')">
        <img src="spell_veil.png">
        <span>Veil of Mist</span>
      </div>

      <div class="sound-btn" onclick="playAudioById('healing')">
        <img src="spell_waterhealing.png">
        <span>Water of Healing</span>
      </div>

      <div class="sound-btn" onclick="playAudioById('sleep')">
        <img src="spell_sleep.png">
        <span>Sleep</span>
      </div>
    </div>

  </div>

  <!-- AUDIO (ne touche pas à ça 👇) -->
  <audio id="veil" src="https://ndrapeau77-sb.github.io/soundboard/eau_veil.mp3"></audio>
  <audio id="healing" src="https://ndrapeau77-sb.github.io/soundboard/eau_healing.mp3"></audio>
  <audio id="sleep" src="https://ndrapeau77-sb.github.io/soundboard/eau_sleep.mp3"></audio>

  <script>
    let currentAudio = null;

    function playAudioById(id) {
      const audio = document.getElementById(id);

      if (currentAudio && currentAudio !== audio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      audio.currentTime = 0;
      currentAudio = audio;

      audio.play().catch(() => {
        alert("Le son ne charge pas.");
      });
    }
  </script>

</body>
</html>
