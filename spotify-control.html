<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contrôle Spotify</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    .card {
      width: min(92vw, 520px);
      background: rgba(0,0,0,0.55);
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 18px;
    }

    .btn {
      display: block;
      width: 100%;
      margin-bottom: 12px;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: rgba(255,255,255,0.14);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    .btn.primary {
      background: #1db954;
    }

    .btn:active {
      transform: scale(0.98);
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      text-align: left;
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 12px;
      font-size: 0.92rem;
      min-height: 90px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Contrôle Spotify</h2>

    <button class="btn" onclick="showToken()">Voir token</button>
    <button class="btn" onclick="pauseSpotify()">Pause Spotify</button>
    <button class="btn primary" onclick="playSpotify()">Play Spotify</button>
    <button class="btn" onclick="goToApp()">Retour à l'app</button>
    <button class="btn" onclick="disconnectSpotify()">Déconnexion Spotify</button>

    <pre id="status">Prêt.</pre>
  </div>

  <script>
    const statusEl = document.getElementById("status");

    function getToken() {
      return localStorage.getItem("access_token");
    }

    function clearSpotifySession() {
      localStorage.removeItem("access_token");
      localStorage.removeItem("refresh_token");
      localStorage.removeItem("code_verifier");
    }

    function setStatus(message) {
      if (typeof message === "string") {
        statusEl.textContent = message;
      } else {
        statusEl.textContent = JSON.stringify(message, null, 2);
      }
    }

    function goToApp() {
      window.location.href = "index.html";
    }

    function disconnectSpotify() {
      clearSpotifySession();
      setStatus("Session Spotify supprimée.");
    }

    function showToken() {
      const token = getToken();
      if (!token) {
        setStatus("Aucun token trouvé.");
        return;
      }

      setStatus("Token trouvé :\n" + token);
    }

    async function spotifyFetch(url, options = {}) {
      const token = getToken();

      if (!token) {
        setStatus("Token absent.");
        throw new Error("Token absent");
      }

      const response = await fetch(url, {
        ...options,
        headers: {
          ...(options.headers || {}),
          Authorization: "Bearer " + token
        }
      });

      if (response.status === 401) {
        clearSpotifySession();
        setStatus("Token expiré. Reconnecte-toi à Spotify.");
        throw new Error("Token expiré");
      }

      return response;
    }

    async function pauseSpotify() {
      try {
        const response = await spotifyFetch("https://api.spotify.com/v1/me/player/pause", {
          method: "PUT"
        });

        if (response.status === 204) {
          setStatus("Spotify mis en pause.");
        } else {
          const text = await response.text();
          setStatus("Erreur pause Spotify : " + response.status + " " + text);
        }
      } catch (error) {
        if (error.message !== "Token expiré") {
          setStatus("Erreur réseau : " + error.message);
        }
      }
    }

    async function playSpotify() {
      try {
        const response = await spotifyFetch("https://api.spotify.com/v1/me/player/play", {
          method: "PUT"
        });

        if (response.status === 204) {
          setStatus("Spotify relancé.");
        } else {
          const text = await response.text();
          setStatus("Erreur play Spotify : " + response.status + " " + text);
        }
      } catch (error) {
        if (error.message !== "Token expiré") {
          setStatus("Erreur réseau : " + error.message);
        }
      }
    }
  </script>

</body>
</html>
