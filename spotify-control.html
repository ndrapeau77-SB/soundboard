<!DOCTYPE html>
<html>
<head>
  <title>Control Spotify</title>
</head>
<body>

<h2>Contrôle Spotify</h2>

<button onclick="showToken()">Voir token</button>
<button onclick="pauseSpotify()">Pause Spotify</button>
<button onclick="playSpotify()">Play Spotify</button>

<pre id="status"></pre>

<script>
const statusEl = document.getElementById("status");

function getToken() {
  return localStorage.getItem("access_token");
}

function setStatus(message) {
  if (typeof message === "string") {
    statusEl.textContent = message;
  } else {
    statusEl.textContent = JSON.stringify(message, null, 2);
  }
}

function showToken() {
  const token = getToken();
  if (!token) {
    setStatus("Aucun token trouvé.");
    return;
  }

  setStatus("Token trouvé :\n" + token);
}

async function pauseSpotify() {
  const token = getToken();
  if (!token) {
    setStatus("Token absent.");
    return;
  }

  try {
    const response = await fetch("https://api.spotify.com/v1/me/player/pause", {
      method: "PUT",
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (response.status === 204) {
      setStatus("Spotify mis en pause.");
    } else {
      const text = await response.text();
      setStatus("Erreur pause Spotify : " + response.status + " " + text);
    }
  } catch (error) {
    setStatus("Erreur réseau : " + error.message);
  }
}

async function playSpotify() {
  const token = getToken();
  if (!token) {
    setStatus("Token absent.");
    return;
  }

  try {
    const response = await fetch("https://api.spotify.com/v1/me/player/play", {
      method: "PUT",
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (response.status === 204) {
      setStatus("Spotify relancé.");
    } else {
      const text = await response.text();
      setStatus("Erreur play Spotify : " + response.status + " " + text);
    }
  } catch (error) {
    setStatus("Erreur réseau : " + error.message);
  }
}
</script>

</body>
</html>
