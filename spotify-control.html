<!DOCTYPE html>
<html>
<head>
  <title>Control Spotify</title>
</head>
<body>

<h2>Contrôle Spotify</h2>

<button onclick="pauseSpotify()">Pause Spotify</button>
<button onclick="playSpotify()">Play Spotify</button>

<p id="status"></p>

<script>
const token = localStorage.getItem("access_token");
const statusEl = document.getElementById("status");

if (!token) {
  statusEl.textContent = "Aucun access token trouvé. Reconnecte-toi avec spotify-login.html";
}

async function pauseSpotify() {
  if (!token) {
    statusEl.textContent = "Token absent.";
    return;
  }

  try {
    const response = await fetch("https://api.spotify.com/v1/me/player/pause", {
      method: "PUT",
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (response.status === 204) {
      statusEl.textContent = "Spotify mis en pause.";
    } else {
      const text = await response.text();
      statusEl.textContent = "Erreur pause Spotify : " + response.status + " " + text;
    }
  } catch (error) {
    statusEl.textContent = "Erreur réseau : " + error.message;
  }
}

async function playSpotify() {
  if (!token) {
    statusEl.textContent = "Token absent.";
    return;
  }

  try {
    const response = await fetch("https://api.spotify.com/v1/me/player/play", {
      method: "PUT",
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (response.status === 204) {
      statusEl.textContent = "Spotify relancé.";
    } else {
      const text = await response.text();
      statusEl.textContent = "Erreur play Spotify : " + response.status + " " + text;
    }
  } catch (error) {
    statusEl.textContent = "Erreur réseau : " + error.message;
  }
}
</script>

</body>
</html>
