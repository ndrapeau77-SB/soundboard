<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contrôle Spotify</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    .card {
      width: min(92vw, 520px);
      background: rgba(0,0,0,0.55);
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 18px;
    }

    .btn {
      display: block;
      width: 100%;
      margin-bottom: 12px;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: rgba(255,255,255,0.14);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    .btn.primary {
      background: #1db954;
    }

    .btn:active {
      transform: scale(0.98);
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      text-align: left;
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 12px;
      font-size: 0.92rem;
      min-height: 90px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Contrôle Spotify</h2>

    <button class="btn" onclick="showToken()">Voir token</button>
    <button class="btn" onclick="pauseSpotify()">Pause Spotify</button>
    <button class="btn primary" onclick="playSpotify()">Play Spotify</button>
    <button class="btn" onclick="goToApp()">Retour à l'app</button>
    <button class="btn" onclick="disconnectSpotify()">Déconnexion Spotify</button>

    <pre id="status">Prêt.</pre>
  </div>

  <script>
    const clientId = "a0be0072df274f70ab0c1ab08a66b890";
    const statusEl = document.getElementById("status");

    function setStatus(message) {
      if (typeof message === "string") {
        statusEl.textContent = message;
      } else {
        statusEl.textContent = JSON.stringify(message, null, 2);
      }
    }

    function getToken() {
      return localStorage.getItem("access_token");
    }

    function getRefreshToken() {
      return localStorage.getItem("refresh_token");
    }

    function getExpiresAt() {
      const value = localStorage.getItem("token_expires_at");
      return value ? Number(value) : 0;
    }

    function clearSpotifySession() {
      localStorage.removeItem("access_token");
      localStorage.removeItem("refresh_token");
      localStorage.removeItem("token_expires_at");
      localStorage.removeItem("code_verifier");
    }

    function goToApp() {
      window.location.href = "index.html";
    }

    function disconnectSpotify() {
      clearSpotifySession();
      setStatus("Session Spotify supprimée.");
    }

    function showToken() {
      const token = getToken();
      if (!token) {
        setStatus("Aucun token trouvé.");
        return;
      }

      setStatus("Token trouvé :\n" + token);
    }

    async function refreshSpotifyToken() {
      const refreshToken = getRefreshToken();

      if (!refreshToken) {
        setStatus("Aucun refresh token disponible. Reconnecte-toi.");
        return false;
      }

      try {
        const response = await fetch("https://accounts.spotify.com/api/token", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: new URLSearchParams({
            grant_type: "refresh_token",
            refresh_token: refreshToken,
            client_id: clientId
          })
        });

        const data = await response.json();

        if (!response.ok || !data.access_token) {
          setStatus(data);
          return false;
        }

        localStorage.setItem("access_token", data.access_token);

        if (data.refresh_token) {
          localStorage.setItem("refresh_token", data.refresh_token);
        }

        if (data.expires_in) {
          localStorage.setItem("token_expires_at", String(Date.now() + (data.expires_in * 1000)));
        }

        setStatus("Token Spotify renouvelé automatiquement ✅");
        return true;
      } catch (err) {
        setStatus("Erreur refresh token : " + err.message);
        return false;
      }
    }

    async function ensureValidToken() {
      const token = getToken();
      const expiresAt = getExpiresAt();

      if (!token) {
        setStatus("Token absent.");
        return false;
      }

      if (!expiresAt) {
        return true;
      }

      const now = Date.now();
      const refreshMargin = 60 * 1000;

      if (now >= (expiresAt - refreshMargin)) {
        return await refreshSpotifyToken();
      }

      return true;
    }

    async function spotifyFetch(url, options = {}) {
      const isValid = await ensureValidToken();

      if (!isValid) {
        clearSpotifySession();
        setStatus("Session expirée. Reconnecte-toi.");
        throw new Error("Token invalide");
      }

      let response = await fetch(url, {
        ...options,
        headers: {
          ...(options.headers || {}),
          Authorization: "Bearer " + getToken()
        }
      });

      if (response.status === 401) {
        const refreshed = await refreshSpotifyToken();

        if (!refreshed) {
          clearSpotifySession();
          setStatus("Session expirée. Reconnecte-toi.");
          throw new Error("Token expiré");
        }

        response = await fetch(url, {
          ...options,
          headers: {
            ...(options.headers || {}),
            Authorization: "Bearer " + getToken()
          }
        });
      }

      return response;
    }

    async function pauseSpotify() {
      try {
        const response = await spotifyFetch("https://api.spotify.com/v1/me/player/pause", {
          method: "PUT"
        });

        if (response.status === 204) {
          setStatus("Spotify mis en pause.");
        } else {
          const text = await response.text();
          setStatus("Erreur pause Spotify : " + response.status + " " + text);
        }
      } catch (err) {
        setStatus("Erreur réseau : " + err.message);
      }
    }

    async function playSpotify() {
      try {
        const response = await spotifyFetch("https://api.spotify.com/v1/me/player/play", {
          method: "PUT"
        });

        if (response.status === 204) {
          setStatus("Spotify relancé.");
        } else {
          const text = await response.text();
          setStatus("Erreur play Spotify : " + response.status + " " + text);
        }
      } catch (err) {
        setStatus("Erreur réseau : " + err.message);
      }
    }
  </script>

</body>
</html>
