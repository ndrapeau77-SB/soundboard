<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="hq_icon.png">
  <link rel="apple-touch-icon" href="hq_icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000">
  <title>Hero Quest Soundboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .app {
      max-width: 1000px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header img {
      width: 100%;
      max-width: 500px;
      display: block;
      margin: 0 auto;
    }

    .immersion-container {
      text-align: center;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .immersion-btn {
      background: #1db954;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
      transition: transform 0.1s ease;
      width: 100%;
      max-width: 340px;
    }

    .immersion-btn:active { transform: scale(0.96); }

    .stop-btn {
      background: rgba(180,0,0,0.7);
      color: white;
      border: none;
      padding: 11px 28px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s ease;
      width: 100%;
      max-width: 340px;
    }

    .stop-btn:active { transform: scale(0.96); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      justify-items: center;
    }

    .folder-btn {
      position: relative;
      width: 100%;
      max-width: 200px;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      display: block;
      transition: transform 0.1s ease;
    }

    .folder-btn:active { transform: scale(0.97); }

    .folder-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: rgba(0,0,0,0.4);
      display: block;
    }

    .folder-btn span {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px;
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .folder-btn { height: 240px; }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="header">
      <img src="hqentete.png" alt="Hero Quest">
    </div>

    <div class="immersion-container">
      <button class="immersion-btn" onclick="lancerImmersion()">
        🎲 Lancer l'immersion
      </button>
      <button class="stop-btn" onclick="stopImmersion()">
        ⏹ Arrêter la musique
      </button>
    </div>

    <div class="grid">
      <a class="folder-btn" href="heros.html">
        <img src="heros.png" alt="Héros">
        <span>Héros</span>
      </a>
      <a class="folder-btn" href="zargon.html">
        <img src="zargon.png" alt="Zargon">
        <span>Zargon</span>
      </a>
    </div>

  </div>

  <script>
    // Musique d'ambiance principale — remplace par ton fichier
    const AMBIANCE_FILE = "ambiance1.mp3";

    let ambianceAudio = null;

    function lancerImmersion() {
      // Si déjà en train de jouer → on repart du début
      if (ambianceAudio) {
        ambianceAudio.pause();
        ambianceAudio.currentTime = 0;
      }
      ambianceAudio = new Audio(AMBIANCE_FILE);
      ambianceAudio.loop = true; // boucle infinie
      ambianceAudio.volume = 0.8;
      ambianceAudio.play().catch(() => {});
    }

    function stopImmersion() {
      if (ambianceAudio) {
        ambianceAudio.pause();
        ambianceAudio.currentTime = 0;
      }
    }

    // Expose globalement pour que heros.html puisse arrêter la musique
    // quand un son de porte joue (via sessionStorage)
    window.addEventListener("focus", () => {
      if (sessionStorage.getItem("stopAmbiance") === "1") {
        sessionStorage.removeItem("stopAmbiance");
        stopImmersion();
      }
    });
  </script>

</body>
</html>
