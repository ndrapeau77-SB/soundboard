<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Héros</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    .app {
      max-width: 980px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    /* 🔥 ENTÊTE IMAGE */
    .header-img {
      width: 100%;
      max-width: 400px;
      display: block;
      margin: 0 auto 20px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      background: rgba(0,0,0,0.65);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .status {
      text-align: center;
      margin-bottom: 15px;
      font-size: 14px;
      opacity: 0.8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 220px));
      justify-content: center;
      gap: 24px 36px;
    }

    .btn {
      display: block;
      width: 100%;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      background: rgba(0,0,0,0.25);
      border: none;
      padding: 0;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn span {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
      text-shadow: 0 2px 6px rgba(0,0,0,1);
    }

    @media (max-width: 560px) {
      .btn {
        height: 220px;
      }
    }
  </style>
</head>

<body>
<div class="app">

  <!-- 🔥 IMAGE HEROQUEST -->
  <img src="hqentete.png" class="header-img">

  <div class="topbar">
    <a href="index.html">← Retour</a>
  </div>

  <div id="status" class="status">Prêt.</div>

  <div class="grid">

    <a class="btn" href="combats.html">
      <img src="combats.png">
      <span>Combats</span>
    </a>

    <a class="btn" href="pieges.html">
      <img src="pieges.png">
      <span>Pièges</span>
    </a>

    <button class="btn" onclick="playDoor()">
      <img src="portes.png">
      <span>Portes</span>
    </button>

    <button class="btn" onclick="playSpotify()">
      <img src="musique.png">
      <span>Ambiance 🎵</span>
    </button>

  </div>

</div>

<script>
const clientId = "a0be0072df274f70ab0c1ab08a66b890";

const doorSounds = [
  "porte1.mp3",
  "porte2.mp3",
  "porte3.mp3",
  "porte4.mp3"
];

let audio = null;

function setStatus(msg){
  document.getElementById("status").textContent = msg;
}

function getToken(){
  return localStorage.getItem("access_token");
}

async function pauseSpotify(){
  const token = getToken();
  if(!token) return;

  await fetch("https://api.spotify.com/v1/me/player/pause",{
    method:"PUT",
    headers:{ Authorization:"Bearer "+token }
  });
}

async function playSpotify(){
  const token = getToken();

  if(!token){
    alert("Connecte Spotify");
    window.location.href="spotify-login.html";
    return;
  }

  await fetch("https://api.spotify.com/v1/me/player/play",{
    method:"PUT",
    headers:{ Authorization:"Bearer "+token }
  });

  setStatus("Ambiance lancée 🎵");
}

async function playDoor(){
  await pauseSpotify();

  if(audio){
    audio.pause();
    audio.currentTime=0;
  }

  const rand=Math.floor(Math.random()*doorSounds.length);
  audio=new Audio(doorSounds[rand]);
  audio.play();

  setStatus("Porte 🔊");
}
</script>

</body>
</html>
