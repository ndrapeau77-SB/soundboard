<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="hq_icon.png">
  <link rel="apple-touch-icon" href="hq_icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000">
  <title>Hero Quest Soundboard</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(0,0,0,0.75);
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar img.logo {
      height: 48px;
      object-fit: contain;
      cursor: pointer;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-play, .btn-stop, .btn-home {
      border: none;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    .btn-play { background: #1db954; }
    .btn-stop { background: rgba(180,0,0,0.8); }
    .btn-home { background: rgba(255,255,255,0.15); }

    #frame {
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: calc(100vh - 70px);
      border: none;
      background: transparent;
    }

    /* 🔥 BOUTON MORT LARGE */
    .btn-death-wide {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      height: 90px;
      border-radius: 18px;
      overflow: hidden;
      z-index: 200;
      border: none;
      cursor: pointer;
      background: transparent;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .btn-death-wide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn-death-wide span {
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
      font-weight: bold;
      font-size: 1.2rem;
      background: rgba(0,0,0,0.7);
    }

    #death-flash {
      position: fixed;
      inset: 0;
      background: rgba(180,0,0,0);
      pointer-events: none;
      z-index: 9999;
      transition: background 0.1s ease;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <img class="logo" src="hqentete.png" onclick="goHome()">

    <div class="controls">
      <button class="btn-home" onclick="goHome()">🏠</button>
      <button class="btn-play" onclick="lancerImmersion()">🎵</button>
      <button class="btn-stop" onclick="stopImmersion()">⏹</button>
    </div>
  </div>

  <iframe id="frame" src="accueil.html"></iframe>

  <!-- 💀 NOUVEAU BOUTON -->
  <button class="btn-death-wide" onclick="playDeath()">
    <img src="mort.png">
    <span>☠️ Mort</span>
  </button>

  <div id="death-flash"></div>

  <script>
    const AMBIANCE_FILE = "ambiance1.mp3";
    let ambianceAudio = null;
    let deathAudio = null;

    function lancerImmersion() {
      if (ambianceAudio) {
        ambianceAudio.pause();
        ambianceAudio.currentTime = 0;
      }
      ambianceAudio = new Audio(AMBIANCE_FILE);
      ambianceAudio.loop = true;
      ambianceAudio.volume = 0.8;
      ambianceAudio.play().catch(() => {});
    }

    function stopImmersion() {
      if (ambianceAudio) {
        ambianceAudio.pause();
        ambianceAudio.currentTime = 0;
      }
    }

    function goHome() {
      document.getElementById("frame").src = "accueil.html";
    }

    function navigateTo(page) {
      document.getElementById("frame").src = page;
    }

    function stopAmbianceFromFrame() {
      stopImmersion();
    }

    function playDeath() {

      stopImmersion();

      if ("vibrate" in navigator) {
        navigator.vibrate([120, 80, 120]);
      }

      const flash = document.getElementById("death-flash");

      flash.style.background = "rgba(180,0,0,0.5)";

      setTimeout(() => {
        flash.style.background = "rgba(180,0,0,0)";

        setTimeout(() => {
          flash.style.background = "rgba(180,0,0,0.5)";

          setTimeout(() => {
            flash.style.background = "rgba(180,0,0,0)";
          }, 120);
        }, 80);

      }, 120);

      if (deathAudio) {
        deathAudio.pause();
        deathAudio.currentTime = 0;
      }

      deathAudio = new Audio("mort.mp3");
      deathAudio.play().catch(() => {});
    }
  </script>

</body>
</html>
