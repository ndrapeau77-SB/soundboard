<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="hq_icon.png">
  <link rel="apple-touch-icon" href="hq_icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000">
  <title>Hero Quest Soundboard</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(0,0,0,0.75);
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar img.logo {
      height: 48px;
      object-fit: contain;
      cursor: pointer;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-play,
    .btn-heroes,
    .btn-zargon,
    .btn-stop,
    .btn-home {
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      padding: 9px 14px;
    }

    .btn-play {
      background: #1db954;
      padding: 9px 18px;
    }

    .btn-heroes {
      background: rgba(40,120,255,0.9);
    }

    .btn-zargon {
      background: rgba(170,40,255,0.9);
    }

    .btn-stop {
      background: rgba(180,0,0,0.8);
    }

    .btn-home {
      background: rgba(255,255,255,0.15);
    }

    .btn-play:active,
    .btn-heroes:active,
    .btn-zargon:active,
    .btn-stop:active,
    .btn-home:active {
      transform: scale(0.96);
    }

    #statusBar {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 0.9rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      white-space: nowrap;
    }

    #statusBar.show {
      opacity: 1;
    }

    #frame {
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: calc(100vh - 70px);
      border: none;
      background: transparent;
    }

    @media (max-width: 480px) {
      .topbar { padding: 8px 12px; }
      .topbar img.logo { height: 36px; }
      .btn-play, .btn-stop, .btn-home, .btn-heroes, .btn-zargon {
        font-size: 0.85rem;
        padding: 8px 12px;
      }
      #statusBar {
        top: 96px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <img class="logo" src="hqentete.png" alt="Hero Quest" onclick="goHome()">
    <div class="controls">
      <button class="btn-home" onclick="goHome()"> 🏠 </button>
      <button class="btn-play" onclick="lancerImmersion()">Amb</button>
      <button class="btn-heroes" onclick="playHeroMusic()">Héros</button>
      <button class="btn-zargon" onclick="playZargonMusic()">Zargon</button>
      <button class="btn-stop" onclick="stopAllMusic()"> ⏹ </button>
    </div>
  </div>

  <div id="statusBar"></div>

  <iframe id="frame" src="accueil.html"></iframe>

  <script>
    const immersionSounds = [
      "ambiance1.mp3"
    ];

    const heroMusicSounds = [
      "muz_heros1.mp3",
      "muz_heros2.mp3",
      "muz_heros3.mp3",
      "muz_heros4.mp3",
      "muz_heros5.mp3",
      "muz_heros6.mp3",
      "muz_heros7.mp3",
      "muz_heros8.mp3"
    ];

    const zargonMusicSounds = [
      "muz_zargon1.mp3",
      "muz_zargon2.mp3",
      "muz_zargon3.mp3",
      "muz_zargon4.mp3",
      "muz_zargon5.mp3",
      "muz_zargon6.mp3",
      "muz_zargon7.mp3",
      "muz_zargon8.mp3"
    ];

    let fixedAudio = null;
    let fixedMode = null;
    let fixedPlaylist = [];
    let fixedIndex = 0;
    let statusTimer = null;

    function showStatus(message) {
      const bar = document.getElementById("statusBar");
      bar.textContent = message;
      bar.classList.add("show");

      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => {
        bar.classList.remove("show");
      }, 1800);
    }

    function stopCurrentFixedAudio() {
      if (fixedAudio) {
        fixedAudio.pause();
        fixedAudio.currentTime = 0;
        fixedAudio.onended = null;
        fixedAudio.onerror = null;
      }
      fixedAudio = null;
    }

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildPlaylist(sourceArray) {
      fixedPlaylist = shuffleArray(sourceArray);
      fixedIndex = 0;
    }

    function playNextFixedTrack() {
      if (!fixedMode || !fixedPlaylist.length) return;

      if (fixedIndex >= fixedPlaylist.length) {
        if (fixedMode === "immersion") {
          buildPlaylist(immersionSounds);
        } else if (fixedMode === "heroes") {
          buildPlaylist(heroMusicSounds);
        } else if (fixedMode === "zargon") {
          buildPlaylist(zargonMusicSounds);
        }
      }

      const file = fixedPlaylist[fixedIndex];
      stopCurrentFixedAudio();

      fixedAudio = new Audio(file);
      fixedAudio.preload = "auto";
      fixedAudio.volume = 0.8;

      fixedAudio.onended = () => {
        fixedIndex++;
        playNextFixedTrack();
      };

      fixedAudio.onerror = () => {
        console.log("Erreur audio fixe:", file);
        fixedIndex++;
        playNextFixedTrack();
      };

      fixedAudio.play().catch((err) => {
        console.log("Lecture impossible:", file, err);
      });
    }

    function startFixedPlaylist(mode, sounds, label) {
      stopCurrentFixedAudio();
      fixedMode = mode;
      buildPlaylist(sounds);
      playNextFixedTrack();
      showStatus(label);
    }

    function lancerImmersion() {
      startFixedPlaylist("immersion", immersionSounds, "🎵 Immersion lancée");
    }

    function playHeroMusic() {
      startFixedPlaylist("heroes", heroMusicSounds, "🛡️ Musique Héros lancée");
    }

    function playZargonMusic() {
      startFixedPlaylist("zargon", zargonMusicSounds, "💀 Musique Zargon lancée");
    }

    function stopAllMusic() {
      stopCurrentFixedAudio();
      fixedMode = null;
      fixedPlaylist = [];
      fixedIndex = 0;
      showStatus("⏹ Musique arrêtée");
    }

    function stopImmersion() {
      stopAllMusic();
    }

    function goHome() {
      document.getElementById("frame").src = "accueil.html";
    }

    function navigateTo(page) {
      document.getElementById("frame").src = page;
    }

    // IMPORTANT : les pages enfants peuvent couper toute musique fixe
    function stopAmbianceFromFrame() {
      stopAllMusic();
    }
  </script>

</body>
</html>
