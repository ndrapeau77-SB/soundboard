<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="hq_icon.png">
  <link rel="apple-touch-icon" href="hq_icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000">
  <title>Hero Quest Soundboard</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(0,0,0,0.75);
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar img.logo {
      height: 48px;
      object-fit: contain;
      cursor: pointer;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-home,
    .btn-amb,
    .btn-resume,
    .btn-death,
    .btn-stop {
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      padding: 9px 14px;
    }

    .btn-home   { background: rgba(255,255,255,0.15); }
    .btn-amb    { background: #1db954; }
    .btn-resume { background: rgba(40,120,255,0.9); }
    .btn-death  { background: rgba(120,0,0,0.9); }
    .btn-stop   { background: rgba(180,0,0,0.8); }

    .btn-home:active,
    .btn-amb:active,
    .btn-resume:active,
    .btn-death:active,
    .btn-stop:active { transform: scale(0.96); }

    #statusBar {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 0.9rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      white-space: nowrap;
    }

    #statusBar.show { opacity: 1; }

    #frame {
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: calc(100vh - 70px);
      border: none;
      background: transparent;
    }

    #death-flash {
      position: fixed;
      inset: 0;
      background: rgba(180,0,0,0);
      pointer-events: none;
      z-index: 9999;
      transition: background 0.1s ease;
    }

    @media (max-width: 480px) {
      .topbar { padding: 8px 12px; }
      .topbar img.logo { height: 36px; }
      .btn-home, .btn-amb, .btn-resume, .btn-death, .btn-stop {
        font-size: 0.85rem;
        padding: 8px 10px;
      }
      #statusBar { top: 96px; font-size: 0.82rem; }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <img class="logo" src="hqentete.png" alt="Hero Quest" onclick="goHome()">
    <div class="controls">
      <button class="btn-home"   onclick="goHome()">🏠</button>
      <button class="btn-amb"    onclick="lancerImmersion()">Amb</button>
      <button class="btn-resume" onclick="reprendreImmersion()">Reprendre</button>
      <button class="btn-death"  onclick="playDeath()">☠️</button>
      <button class="btn-stop"   onclick="stopAllMusic()">⏹</button>
    </div>
  </div>

  <div id="statusBar"></div>
  <div id="death-flash"></div>

  <iframe id="frame" src="accueil.html"></iframe>

  <script src="audio-utils.js"></script>
  <script>
    const AMBIANCE_FILE = "ambiance1.mp3";

    let ambianceAudio      = null;
    let deathAudio         = null;
    let immersionSavedTime = 0;
    let statusTimer        = null;

    function showStatus(message) {
      const bar = document.getElementById("statusBar");
      bar.textContent = message;
      bar.classList.add("show");
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => bar.classList.remove("show"), 1800);
    }

    // ─── Lancer ambiance depuis le début ─────────────────────────────────────
    async function lancerImmersion() {
      immersionSavedTime = 0;
      await _playAmbiance(0);
      showStatus("🎵 Ambiance lancée");
    }

    // ─── Reprendre là où on avait arrêté ─────────────────────────────────────
    async function reprendreImmersion() {
      if (immersionSavedTime === 0) {
        showStatus("▶️ Rien à reprendre");
        return;
      }
      await _playAmbiance(immersionSavedTime);
      showStatus("▶️ Reprise à " + Math.floor(immersionSavedTime) + "s");
    }

    async function _playAmbiance(startAt = 0) {
      if (ambianceAudio) {
        ambianceAudio.onended = null;
        await fadeOut(ambianceAudio, 300);
        ambianceAudio = null;
      }

      const audio = new Audio(AMBIANCE_FILE);
      audio.loop        = true;
      audio.volume      = 0;
      audio.currentTime = startAt;
      ambianceAudio     = audio;

      audio.play()
        .then(() => fadeIn(audio, 500, 0.8))
        .catch(() => {});
    }

    // ─── Stop ─────────────────────────────────────────────────────────────────
    async function stopAllMusic() {
      if (ambianceAudio) {
        immersionSavedTime = ambianceAudio.currentTime;
        ambianceAudio.onended = null;
        await fadeOut(ambianceAudio, 400);
        ambianceAudio = null;
      }
      showStatus("⏹ Musique arrêtée");
    }

    // ─── Navigation ───────────────────────────────────────────────────────────
    function goHome() {
      document.getElementById("frame").src = "accueil.html";
    }

    function navigateTo(page) {
      document.getElementById("frame").src = page;
    }

    function stopAmbianceFromFrame() {
      stopAllMusic();
    }

    // ─── Mort ─────────────────────────────────────────────────────────────────
    async function playDeath() {
      if ("vibrate" in navigator) navigator.vibrate([120, 80, 120]);

      await stopAllMusic();

      const flash = document.getElementById("death-flash");
      flash.style.background = "rgba(180,0,0,0.5)";
      setTimeout(() => {
        flash.style.background = "rgba(180,0,0,0)";
        setTimeout(() => {
          flash.style.background = "rgba(180,0,0,0.5)";
          setTimeout(() => { flash.style.background = "rgba(180,0,0,0)"; }, 120);
        }, 80);
      }, 120);

      if (deathAudio) {
        deathAudio.onended = null;
        await fadeOut(deathAudio, 120);
      }
      const audio  = new Audio("mort.mp3");
      audio.volume = 0;
      deathAudio   = audio;
      audio.play()
        .then(() => fadeIn(audio, 180, 1.0))
        .catch(() => {});
    }
  </script>

</body>
</html>
