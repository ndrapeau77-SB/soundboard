<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeroQuest</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    .btn {
      margin: 10px;
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: rgba(0,0,0,0.7);
    }

    .spotify {
      background: #1db954;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      text-decoration: none;
      color: white;
    }

    .card img {
      width: 100%;
      border-radius: 12px;
    }
  </style>
</head>

<body>
<div class="app">

  <h1>HeroQuest 🎲</h1>

  <!-- LOGIN -->
  <button class="btn" onclick="loginSpotify()" id="loginBtn">
    🔐 Connexion Spotify
  </button>

  <!-- IMMERSION -->
  <button class="btn spotify" onclick="launchImmersion()">
    🎵 Lancer l'immersion
  </button>

  <div id="status"></div>

  <div class="grid">
    <a class="card" href="heros.html">
      <img src="heros.png">
      <div>Héros</div>
    </a>

    <a class="card" href="zargon.html">
      <img src="zargon.png">
      <div>Zargon</div>
    </a>
  </div>

</div>

<script>
const clientId = "a0be0072df274f70ab0c1ab08a66b890";

function getToken() {
  return localStorage.getItem("access_token");
}

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

function updateUI(){
  if(getToken()){
    document.getElementById("loginBtn").innerText = "✅ Spotify connecté";
  }
}

function loginSpotify(){
  window.location.href = "spotify-login.html";
}

async function refreshSpotifyToken(){
  const refreshToken = localStorage.getItem("refresh_token");
  if(!refreshToken) return false;

  const res = await fetch("https://accounts.spotify.com/api/token",{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded"
    },
    body:new URLSearchParams({
      grant_type:"refresh_token",
      refresh_token:refreshToken,
      client_id:clientId
    })
  });

  const data = await res.json();

  if(!data.access_token) return false;

  localStorage.setItem("access_token", data.access_token);

  if(data.expires_in){
    localStorage.setItem("token_expires_at", Date.now()+data.expires_in*1000);
  }

  return true;
}

async function ensureValidToken(){
  const exp = localStorage.getItem("token_expires_at");
  if(!exp) return true;

  if(Date.now() > exp - 60000){
    return await refreshSpotifyToken();
  }

  return true;
}

async function playSpotify(){
  if(!(await ensureValidToken())){
    alert("Reconnecte Spotify");
    return;
  }

  const token = getToken();

  await fetch("https://api.spotify.com/v1/me/player/play",{
    method:"PUT",
    headers:{
      Authorization:"Bearer "+token
    }
  });
}

function launchImmersion(){
  playSpotify();
}

updateUI();
</script>

</body>
</html>
