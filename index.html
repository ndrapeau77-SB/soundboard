<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hero Quest Soundboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;

      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .app {
      max-width: 1000px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    /* HEADER IMAGE */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header img {
      max-width: 100%;
      height: auto;
      max-height: 120px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    /* BOUTONS IMAGE */
    .folder-btn {
      position: relative;
      display: block;
      height: 180px;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      transition: transform 0.08s ease;
    }

    .folder-btn:active {
      transform: scale(0.97);
    }

    .folder-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.75);
    }

    .folder-btn span {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.2));
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    @media (max-width: 480px) {
      .folder-btn {
        height: 150px;
      }

      .folder-btn span {
        font-size: 1rem;
      }
    }

  </style>
</head>

<body>
  <div class="app">

    <!-- ENTÊTE -->
    <div class="header">
      <img src="hqentete.png" alt="Hero Quest">
    </div>

    <!-- DOSSIERS AVEC IMAGES -->
    <div class="grid">

      <a class="folder-btn" href="pieges.html">
        <img src="pieges.png" alt="Pièges">
        <span>Pièges</span>
      </a>

      <a class="folder-btn" href="monstres.html">
        <img src="monstres.png" alt="Monstres">
        <span>Monstres</span>
      </a>

      <a class="folder-btn" href="ambiances.html">
        <img src="ambiances.png" alt="Ambiances">
        <span>Ambiances</span>
      </a>

      <a class="folder-btn" href="autres.html">
        <img src="autres.png" alt="Autres">
        <span>Autres</span>
      </a>

    </div>

  </div>
</body>
</html>
