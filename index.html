<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="hq_icon.png">
  <link rel="apple-touch-icon" href="hq_icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000">
  <title>Hero Quest Soundboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .app {
      max-width: 1000px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header img {
      width: 100%;
      max-width: 500px;
      display: block;
      margin: 0 auto;
    }

    .spotify-container {
      text-align: center;
      margin-bottom: 25px;
    }

    .spotify-btn {
      background: #1db954;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
      transition: transform 0.1s ease;
    }

    .spotify-btn:active {
      transform: scale(0.96);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      justify-items: center;
    }

    .folder-btn {
      position: relative;
      width: 100%;
      max-width: 200px;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      display: block;
      transition: transform 0.1s ease;
    }

    .folder-btn:active {
      transform: scale(0.97);
    }

    .folder-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: rgba(0,0,0,0.4);
      display: block;
    }

    .folder-btn span {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px;
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .folder-btn {
        height: 240px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="header">
      <img src="hqentete.png" alt="Hero Quest">
    </div>

    <!-- LANCER IMMERSION -->
    <div class="spotify-container">
      <button class="spotify-btn" onclick="lancerImmersion()">
        🎲 Lancer l'immersion
      </button>
    </div>

    <!-- DOSSIERS -->
    <div class="grid">
      <a class="folder-btn" href="heros.html">
        <img src="heros.png" alt="Héros">
        <span>Héros</span>
      </a>

      <a class="folder-btn" href="zargon.html">
        <img src="zargon.png" alt="Zargon">
        <span>Zargon</span>
      </a>
    </div>

  </div>

  <script>
    const PLAYLIST_ID = "3xaIM6iYEAGEOA7zCKd4lF";
    const spotifyAppUrl = "spotify:playlist:" + PLAYLIST_ID;
    const spotifyWebUrl = "https://open.spotify.com/playlist/" + PLAYLIST_ID;

    function lancerImmersion() {
      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

      if (isMobile) {
        // Sur mobile : tente d'ouvrir l'app Spotify, fallback vers le web
        window.location.href = spotifyAppUrl;
        setTimeout(() => {
          window.open(spotifyWebUrl, "_blank");
        }, 1500);
      } else {
        // Sur desktop : ouvre le web player dans un nouvel onglet
        window.open(spotifyWebUrl, "_blank");
      }
    }
  </script>

</body>
</html>
