<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="hq_icon.png">
  <link rel="apple-touch-icon" href="hq_icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000">
  <title>Hero Quest Soundboard</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(0,0,0,0.75);
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar img.logo {
      height: 48px;
      cursor: pointer;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .controls button {
      border: none;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    .btn-home     { background: rgba(255,255,255,0.15); }
    .btn-immersion{ background: #1db954; }
    .btn-heros    { background: #3b82f6; }
    .btn-zargon   { background: #dc2626; }
    .btn-death    { background: #6b0000; }
    .btn-stop     { background: rgba(180,0,0,0.8); }

    .controls button:active { transform: scale(0.95); }

    /* ── IFRAME ── */
    #frame {
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      bottom: 145px;
      width: 100%;
      height: calc(100vh - 70px - 145px);
      border: none;
      background: transparent;
    }

    /* ── MONSTERBAR ── */
    .monsterbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(0,0,0,0.82);
      padding: 8px 6px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .monsterbar-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    /* Chaque monstre = icône ronde + nom */
    .monster-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }

    .monster-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.25);
      transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      background: rgba(0,0,0,0.4);
      flex-shrink: 0;
    }

    .monster-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: left bottom;
      display: block;
      pointer-events: none;
    }

    .monster-item:active .monster-icon {
      transform: scale(0.88);
    }

    .monster-item.playing .monster-icon {
      border-color: #f97316;
      box-shadow: 0 0 10px #f97316;
    }

    .monster-name {
      font-size: 0.55rem;
      font-weight: bold;
      color: rgba(255,255,255,0.85);
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      letter-spacing: 0.02em;
    }

    .monster-item.playing .monster-name {
      color: #f97316;
    }

    @media (max-width: 380px) {
      .monster-icon { width: 46px; height: 46px; }
      .monsterbar-row { gap: 5px; }
      .monster-name { font-size: 0.5rem; }
      #frame { bottom: 135px; height: calc(100vh - 70px - 135px); }
    }
  </style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="controls">
    <button class="btn-home"      onclick="goHome()">🏠</button>
    <button class="btn-immersion" onclick="lancerImmersion()">🎵</button>
    <button class="btn-heros"     onclick="toggleHerosMusic()">⚔️</button>
    <button class="btn-zargon"    onclick="toggleZargonMusic()">💀</button>
    <button class="btn-death"     onclick="playDeath()">☠️</button>
    <button class="btn-stop"      onclick="stopAll()">⏹</button>
  </div>
</div>

<!-- IFRAME -->
<iframe id="frame" src="accueil.html"></iframe>

<!-- MONSTERBAR -->
<div class="monsterbar">
  <div class="monsterbar-row">
    <div class="monster-item" id="mi-rat"          onclick="playMonster('rat',          this)">
      <div class="monster-icon"><img src="rat1.png" alt="Rat"></div>
      <span class="monster-name">Rat</span>
    </div>
    <div class="monster-item" id="mi-squelette"    onclick="playMonster('squelette',    this)">
      <div class="monster-icon"><img src="squelette1.png" alt="Squelette"></div>
      <span class="monster-name">Squelette</span>
    </div>
    <div class="monster-item" id="mi-zombie"       onclick="playMonster('zombie',       this)">
      <div class="monster-icon"><img src="zombie1.png" alt="Zombie"></div>
      <span class="monster-name">Zombie</span>
    </div>
    <div class="monster-item" id="mi-momie"        onclick="playMonster('momie',        this)">
      <div class="monster-icon"><img src="momie1.png" alt="Momie"></div>
      <span class="monster-name">Momie</span>
    </div>
    <div class="monster-item" id="mi-gobelin"      onclick="playMonster('gobelin',      this)">
      <div class="monster-icon"><img src="gobelin1.png" alt="Gobelin"></div>
      <span class="monster-name">Gobelin</span>
    </div>
  </div>
  <div class="monsterbar-row">
    <div class="monster-item" id="mi-ogre"         onclick="playMonster('ogre',         this)">
      <div class="monster-icon"><img src="ogre1.png" alt="Ogre"></div>
      <span class="monster-name">Ogre</span>
    </div>
    <div class="monster-item" id="mi-abomination"  onclick="playMonster('abomination',  this)">
      <div class="monster-icon"><img src="abomination1.png" alt="Abomination"></div>
      <span class="monster-name">Abomination</span>
    </div>
    <div class="monster-item" id="mi-gargouille"   onclick="playMonster('gargouille',   this)">
      <div class="monster-icon"><img src="gargouille1.png" alt="Gargouille"></div>
      <span class="monster-name">Gargouille</span>
    </div>
    <div class="monster-item" id="mi-dreadwarrior" onclick="playMonster('dreadwarrior', this)">
      <div class="monster-icon"><img src="dreadwarrior1.png" alt="Dread Warrior"></div>
      <span class="monster-name">Dread Warrior</span>
    </div>
    <div class="monster-item" id="mi-dragon"       onclick="playMonster('dragon',       this)">
      <div class="monster-icon"><img src="dragon1.png" alt="Dragon"></div>
      <span class="monster-name">Dragon</span>
    </div>
  </div>
</div>

<script>
  // ── Sons monstres ─────────────────────────────────────
  const MONSTER_SOUNDS = {
    rat:          ["rat1.mp3","rat2.mp3","rat3.mp3","rat4.mp3","rat5.mp3"],
    squelette:    ["monstre_squelette.mp3","monstre_squelette2.mp3","monstre_squelette3.mp3","monstre_squelette4.mp3"],
    zombie:       ["zombie1.mp3","zombie2.mp3","zombie3.mp3","zombie4.mp3"],
    momie:        ["momie1.mp3"],
    gobelin:      ["monstre_goblin.mp3","goblin1.mp3","goblin2.mp3"],
    ogre:         ["monstre_ord1.mp3","monstre_orc2.mp3","ogre.mp3"],
    abomination:  ["abomination1.mp3","abomination2.mp3"],
    gargouille:   ["monstre_gargouille1.mp3","monstre_gargouille2.mp3","monstre_gargouille3.mp3","monstre_gargouille4.mp3"],
    dreadwarrior: ["dread1.mp3","dread2.mp3","dread3.mp3","dread4.mp3"],
    dragon:       ["dragon.mp3"]
  };

  const lastMonsterIndex = {};

  let monsterCtx       = null;
  const monsterBuffers = {};
  let monsterSource    = null;
  let monsterActiveItem = null;
  let monsterDuckTimeout = null;

  function getMonsterCtx() {
    if (!monsterCtx) monsterCtx = new (window.AudioContext || window.webkitAudioContext)();
    return monsterCtx;
  }

  async function loadMonsterBuffer(file) {
    if (monsterBuffers[file]) return monsterBuffers[file];
    const ctx = getMonsterCtx();
    const res = await fetch(file);
    const ab  = await res.arrayBuffer();
    const buf = await ctx.decodeAudioData(ab);
    monsterBuffers[file] = buf;
    return buf;
  }

  function pickMonsterFile(id) {
    const files = MONSTER_SOUNDS[id];
    if (!files || !files.length) return null;
    if (files.length === 1) return files[0];
    let idx;
    do { idx = Math.floor(Math.random() * files.length); }
    while (idx === lastMonsterIndex[id]);
    lastMonsterIndex[id] = idx;
    return files[idx];
  }

  function clearMonsterItem() {
    if (monsterActiveItem) {
      monsterActiveItem.classList.remove("playing");
      monsterActiveItem = null;
    }
  }

  function stopMonsterSound() {
    if (monsterSource) {
      try { monsterSource.stop(); } catch(e) {}
      monsterSource = null;
    }
    clearMonsterItem();
    clearTimeout(monsterDuckTimeout);
  }

  async function playMonster(id, item) {
    const file = pickMonsterFile(id);
    if (!file) return;

    if ("vibrate" in navigator) navigator.vibrate(30);

    try {
      const ctx = getMonsterCtx();
      if (ctx.state === "suspended") await ctx.resume();

      stopMonsterSound();
      duckMusic(0.15, 200);

      const buffer   = await loadMonsterBuffer(file);
      const source   = ctx.createBufferSource();
      const gainNode = ctx.createGain();
// 🔥 boost spécifique
if (id === "rat" || id === "dreadwarrior") {
  gainNode.gain.value = 1.75;
} else {
  gainNode.gain.value = 0.9;
}   source.buffer = buffer;
      source.connect(gainNode);
      gainNode.connect(ctx.destination);

      monsterSource    = source;
      monsterActiveItem = item;
      item.classList.add("playing");

      source.onended = () => {
        monsterSource = null;
        clearMonsterItem();
        duckMusic(0.8, 400);
      };

      source.start(0);
      monsterDuckTimeout = setTimeout(() => { duckMusic(0.8, 400); clearMonsterItem(); }, 10000);

    } catch(e) { console.error("Monstre audio:", e); }
  }

  // ── Duck musique ──────────────────────────────────────
  function duckMusic(targetVol, durationMs) {
    const steps    = 20;
    const interval = durationMs / steps;
    const current  = musicVolume;
    const delta    = (targetVol - current) / steps;
    let step = 0;
    const timer = setInterval(() => {
      step++;
      setMusicVolume(Math.min(1, Math.max(0, current + delta * step)));
      if (step >= steps) clearInterval(timer);
    }, interval);
  }

  // ── Variables musique ─────────────────────────────────
  let ambianceAudio = null;
  let herosAudio    = null;
  let zargonAudio   = null;
  let deathAudio    = null;
  let ambianceTime  = 0;
  let musicVolume   = 0.8;

  const HEROS_TRACKS = [
    "muz_heros1.mp3","muz_heros2.mp3","muz_heros3.mp3",
    "muz_heros4.mp3","muz_heros5.mp3","muz_heros6.mp3",
    "muz_heros7.mp3","muz_heros8.mp3"
  ];

  const ZARGON_TRACKS = ["war_drums.mp3"];

  function getMusicVolume() { return musicVolume; }

  function setMusicVolume(vol) {
    musicVolume = Math.min(1, Math.max(0, vol));
    if (ambianceAudio) ambianceAudio.volume = musicVolume;
    if (herosAudio)    herosAudio.volume    = musicVolume;
    if (zargonAudio)   zargonAudio.volume   = musicVolume;
  }

  function playLoop(getRef, setRef, tracks) {
    if (getRef()) { getRef().pause(); setRef(null); return; }
    stopAll();
    let index = Math.floor(Math.random() * tracks.length);
    function playNext() {
      const audio = new Audio(tracks[index]);
      setRef(audio);
      audio.volume = musicVolume;
      if (tracks.length === 1) {
        audio.loop = true;
        audio.play().catch(()=>{});
      } else {
        audio.onended = () => { index = (index + 1) % tracks.length; playNext(); };
        audio.play().catch(()=>{});
      }
    }
    playNext();
  }

  function toggleHerosMusic()  { playLoop(() => herosAudio,  (a) => { herosAudio  = a; }, HEROS_TRACKS); }
  function toggleZargonMusic() { playLoop(() => zargonAudio, (a) => { zargonAudio = a; }, ZARGON_TRACKS); }

  function lancerImmersion() {
    stopAll();
    ambianceAudio = new Audio("ambiance1.mp3");
    ambianceAudio.loop = true;
    ambianceAudio.currentTime = ambianceTime || 0;
    ambianceAudio.volume = musicVolume;
    ambianceAudio.play().catch(()=>{});
  }

  function playDeath() {
    stopAll();
    deathAudio = new Audio("mort.mp3");
    deathAudio.play().catch(()=>{});
  }

  function stopAll() {
    musicVolume = 0.8;
    stopMonsterSound();

    if (ambianceAudio) { ambianceTime = ambianceAudio.currentTime; ambianceAudio.pause(); ambianceAudio = null; }
    if (herosAudio)    { herosAudio.pause();  herosAudio  = null; }
    if (zargonAudio)   { zargonAudio.pause(); zargonAudio = null; }
    if (deathAudio)    { deathAudio.pause();  deathAudio  = null; }

    try {
      const frame = document.getElementById("frame");
      if (frame && frame.contentWindow && frame.contentWindow.stopAllLocal) {
        frame.contentWindow.stopAllLocal();
      }
    } catch(e) {}
  }

  function goHome() { document.getElementById("frame").src = "accueil.html"; }
  function navigateTo(page) { document.getElementById("frame").src = page; }
  function stopAmbianceFromFrame() { stopAll(); }

  async function warmUpMonster() {
    try {
      const ctx = getMonsterCtx();
      if (ctx.state === "suspended") await ctx.resume();
      Object.values(MONSTER_SOUNDS).flat().forEach(f => loadMonsterBuffer(f).catch(() => {}));
    } catch(_) {}
  }
  window.addEventListener("touchstart", warmUpMonster, { once: true });
  window.addEventListener("click",      warmUpMonster, { once: true });
</script>

</body>
</html>
