<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="hq_icon.png">
  <link rel="apple-touch-icon" href="hq_icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000">
  <title>Hero Quest Soundboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .app {
      max-width: 1000px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header img {
      width: 100%;
      max-width: 500px;
      display: block;
      margin: 0 auto;
    }

    .spotify-login-container {
      text-align: center;
      margin-bottom: 18px;
    }

    .spotify-login-btn {
      padding: 12px 18px;
      background: rgba(0,0,0,0.7);
      border-radius: 12px;
      font-weight: bold;
      color: white;
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
      font-size: 1rem;
    }

    .spotify-login-btn:active {
      transform: scale(0.96);
    }

    .spotify-container {
      text-align: center;
      margin-bottom: 25px;
    }

    .spotify-btn {
      background: #1db954;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    .spotify-btn:active {
      transform: scale(0.96);
    }

    .status {
      max-width: 620px;
      margin: 0 auto 20px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.45);
      border-radius: 12px;
      font-size: 0.95rem;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      justify-items: center;
    }

    .folder-btn {
      position: relative;
      width: 100%;
      max-width: 200px;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .folder-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: rgba(0,0,0,0.4);
      display: block;
    }

    .folder-btn span {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px;
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .folder-btn {
        height: 240px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- ENTÊTE -->
    <div class="header">
      <img src="hqentete.png" alt="Hero Quest">
    </div>

    <!-- CONNEXION SPOTIFY -->
    <div class="spotify-login-container">
      <button onclick="handleSpotifyLogin()" id="spotifyBtn" class="spotify-login-btn">
        🔐 Connexion Spotify
      </button>
    </div>

    <!-- LANCER IMMERSION -->
    <div class="spotify-container">
      <button class="spotify-btn" onclick="launchImmersion()">
        🎲 Lancer l'immersion
      </button>
    </div>

    <div id="status" class="status">Prêt.</div>

    <!-- DOSSIERS -->
    <div class="grid">
      <a class="folder-btn" href="heros.html">
        <img src="heros.png" alt="Héros">
        <span>Héros</span>
      </a>

      <a class="folder-btn" href="zargon.html">
        <img src="zargon.png" alt="Zargon">
        <span>Zargon</span>
      </a>
    </div>

  </div>

  <script>
    const clientId = "a0be0072df274f70ab0c1ab08a66b890";
    const spotifyBtn = document.getElementById("spotifyBtn");
    const statusEl = document.getElementById("status");
    const spotifyPlaylistAppUrl = "spotify:playlist:3xaIM6iYEAGEOA7zCKd4lF?si=6b7a194991604ba2";
    const spotifyPlaylistWebUrl = "https://open.spotify.com/playlist/3xaIM6iYEAGEOA7zCKd4lF?si=6b7a194991604ba2";

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function getToken() {
      return localStorage.getItem("access_token");
    }

    function updateSpotifyButton() {
      if (getToken()) {
        spotifyBtn.textContent = "✅ Spotify connecté";
      } else {
        spotifyBtn.textContent = "🔐 Connexion Spotify";
      }
    }

    function handleSpotifyLogin() {
      const token = getToken();

      if (!token) {
        window.location.href = "spotify-login.html";
      } else {
        setStatus("Spotify déjà connecté 👍");
      }
    }

    async function refreshSpotifyToken() {
      const refreshToken = localStorage.getItem("refresh_token");
      if (!refreshToken) return false;

      try {
        const response = await fetch("https://accounts.spotify.com/api/token", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: new URLSearchParams({
            grant_type: "refresh_token",
            refresh_token: refreshToken,
            client_id: clientId
          })
        });

        const data = await response.json();

        if (!response.ok || !data.access_token) return false;

        localStorage.setItem("access_token", data.access_token);

        if (data.refresh_token) {
          localStorage.setItem("refresh_token", data.refresh_token);
        }

        if (data.expires_in) {
          localStorage.setItem("token_expires_at", String(Date.now() + (data.expires_in * 1000)));
        }

        return true;
      } catch {
        return false;
      }
    }

    async function ensureValidToken() {
      const exp = localStorage.getItem("token_expires_at");
      if (!exp) return true;

      if (Date.now() > Number(exp) - 60000) {
        return await refreshSpotifyToken();
      }

      return true;
    }

    async function playSpotifyViaApi() {
      const token = getToken();
      if (!token) return false;

      const valid = await ensureValidToken();
      if (!valid) return false;

      try {
        const response = await fetch("https://api.spotify.com/v1/me/player/play", {
          method: "PUT",
          headers: {
            Authorization: "Bearer " + localStorage.getItem("access_token")
          }
        });

        if (response.status === 204) {
          setStatus("Commande Spotify envoyée.");
          return true;
        }

        if (response.status === 401) {
          localStorage.removeItem("access_token");
          localStorage.removeItem("refresh_token");
          localStorage.removeItem("token_expires_at");
          updateSpotifyButton();
          setStatus("Session Spotify expirée. Reconnecte-toi.");
          return false;
        }

        const text = await response.text();
        console.log("Erreur play Spotify:", response.status, text);
        setStatus("Spotify API n'a pas pu lancer la lecture. Ouverture de Spotify...");
        return false;
      } catch (error) {
        console.log("Erreur réseau Spotify:", error);
        setStatus("Erreur réseau Spotify. Ouverture de Spotify...");
        return false;
      }
    }

    async function launchImmersion() {
      setStatus("Tentative de lancement de l'ambiance...");

      const startedByApi = await playSpotifyViaApi();

      if (startedByApi) return;

      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

      if (isMobile) {
        window.location.href = spotifyPlaylistAppUrl;
        setTimeout(() => {
          window.location.href = spotifyPlaylistWebUrl;
        }, 1200);
      } else {
        window.location.href = spotifyPlaylistWebUrl;
      }
    }

    updateSpotifyButton();
  </script>

</body>
</html>
