<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hero Quest Soundboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;

      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .app {
      max-width: 1000px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    /* HEADER IMAGE */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header img {
      max-width: 100%;
      height: auto;
      max-height: 120px;
    }

    /* GRID DOSSIERS */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .folder-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 140px;
      border-radius: 18px;
      text-decoration: none;
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.55);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform 0.08s ease, background 0.2s ease;
    }

    .folder-btn:active {
      transform: scale(0.97);
    }

    .folder-btn:hover {
      background: rgba(0,0,0,0.7);
    }

    /* Couleurs optionnelles par catégorie */
    .pieges { border-left: 5px solid #ef4444; }
    .monstres { border-left: 5px solid #22c55e; }
    .ambiances { border-left: 5px solid #3b82f6; }
    .autres { border-left: 5px solid #a855f7; }

    @media (max-width: 480px) {
      .folder-btn {
        min-height: 110px;
        font-size: 1rem;
      }
    }

  </style>
</head>

<body>
  <div class="app">

    <!-- IMAGE ENTÊTE -->
    <div class="header">
      <img src="hqentete.png" alt="Hero Quest">
    </div>

    <!-- DOSSIERS -->
    <div class="grid">

      <a class="folder-btn pieges" href="pieges.html">
        Pièges
      </a>

      <a class="folder-btn monstres" href="monstres.html">
        Monstres
      </a>

      <a class="folder-btn ambiances" href="ambiances.html">
        Ambiances
      </a>

      <a class="folder-btn autres" href="autres.html">
        Autres
      </a>

    </div>

  </div>
</body>
</html>
