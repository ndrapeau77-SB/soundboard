<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hero Quest Soundboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;

      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .app {
      max-width: 1000px;
      margin: auto;
      padding: 20px 16px 40px;
    }

    /* HEADER IMAGE */
    .header {
      text-align: center;
      margin-bottom: 35px;
    }

    .header img {
      width: 100%;
      max-width: 500px; /* PLUS GROS */
      height: auto;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      justify-items: center;
    }

    /* BOUTONS LONGS */
    .folder-btn {
      position: relative;
      display: block;
      width: 100%;
      max-width: 200px;
      height: 280px; /* PLUS LONG */
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: transform 0.1s ease;
    }

    .folder-btn:active {
      transform: scale(0.97);
    }

    /* IMAGE */
    .folder-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* IMPORTANT pour voir complet */
      background: rgba(0,0,0,0.4);
    }

    /* TEXTE */
    .folder-btn span {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 14px;
  font-size: 1.2rem;
  font-weight: bold;
  text-align: center;

  color: #ffffff; /* 🔥 TEXTE BLANC */

  background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
  text-shadow: 0 2px 6px rgba(0,0,0,1); /* plus lisible */
}

    /* MOBILE */
    @media (max-width: 480px) {
      .header img {
        max-width: 320px;
      }

      .folder-btn {
        height: 240px;
      }

      .folder-btn span {
        font-size: 1rem;
      }
    }

  </style>
</head>

<body>
  <div class="app">

    <!-- ENTÊTE -->
    <div class="header">
      <img src="hqentete.png" alt="Hero Quest">
    </div>

    <!-- DOSSIERS -->
    <div class="grid">

      <a class="folder-btn" href="pieges.html">
        <img src="pieges.png" alt="Pièges">
        <span>Pièges</span>
      </a>

      <a class="folder-btn" href="monstres.html">
        <img src="monstres.png" alt="Monstres">
        <span>Monstres</span>
      </a>

      <a class="folder-btn" href="ambiances.html">
        <img src="ambiances.png" alt="Ambiances">
        <span>Ambiances</span>
      </a>

      <a class="folder-btn" href="autres.html">
        <img src="autres.png" alt="Autres">
        <span>Autres</span>
      </a>

    </div>

  </div>
</body>
</html>
