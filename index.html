<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Quest Soundboard</title>
  <meta name="theme-color" content="#111827" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  min-height: 100vh;

  background: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
    url('heroquestbackground.jpg');

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 22px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .header p {
      margin: 0;
      opacity: 0.8;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .sound-btn {
      border: none;
      border-radius: 18px;
      padding: 20px 12px;
      min-height: 80px;
      font-size: 1rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    .sound-btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    /* Couleurs */
    .rat { background: #6b7280; }
    .squelette { background: #94a3b8; }
    .gobelin { background: #16a34a; }
    .ogre { background: #b45309; }
    .abomination { background: #7c3aed; }
    .monstre { background: #dc2626; }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 1.7rem;
      }

      .sound-btn {
        min-height: 72px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <h1>Hero Quest Soundboard 🔊</h1>
      <p>Appuie sur une créature pour jouer son son</p>
    </div>

    <div class="grid">
      <button class="sound-btn rat" onclick="playSound('rat')">Rat</button>
      <button class="sound-btn squelette" onclick="playSound('squelette')">Squelette</button>
      <button class="sound-btn gobelin" onclick="playSound('gobelin')">Gobelin</button>
      <button class="sound-btn ogre" onclick="playSound('ogre')">Ogre</button>
      <button class="sound-btn abomination" onclick="playSound('abomination')">Abomination</button>
      <button class="sound-btn monstre" onclick="playSound('monstre')">Monstre 👹</button>
    </div>

    <div class="footer">
      Soundboard Hero Quest
    </div>
  </div>

  <!-- Sons -->
  <audio id="rat" src="rat.mp3"></audio>
  <audio id="squelette" src="squelette.mp3"></audio>
  <audio id="gobelin" src="gobelin.mp3"></audio>
  <audio id="ogre" src="ogre.mp3"></audio>
  <audio id="abomination" src="abomination.mp3"></audio>
  <audio id="monstre" src="monstre.mp3"></audio>

  <script>
    function playSound(id) {
      const sound = document.getElementById(id);
      if (!sound) return;
      sound.currentTime = 0;
      sound.play();
    }
  </script>
</body>
</html>
