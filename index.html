<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="hq_icon.png">
  <link rel="apple-touch-icon" href="hq_icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000">
  <title>Hero Quest Soundboard</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    /* ── Barre du haut fixe ── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(0,0,0,0.75);
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar img.logo {
      height: 48px;
      object-fit: contain;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-play {
      background: #1db954;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-play:active { transform: scale(0.96); }

    .btn-stop {
      background: rgba(180,0,0,0.8);
      color: white;
      border: none;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-stop:active { transform: scale(0.96); }

    .btn-home {
      background: rgba(255,255,255,0.15);
      color: white;
      border: none;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-home:active { transform: scale(0.96); }

    /* ── Iframe qui prend tout l'espace sous la topbar ── */
    #frame {
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: calc(100vh - 70px);
      border: none;
      background: transparent;
    }

    /* Ajustement si la topbar prend plus de place sur petit écran */
    @media (max-width: 480px) {
      .topbar { padding: 8px 12px; }
      .topbar img.logo { height: 36px; }
      .btn-play, .btn-stop, .btn-home {
        font-size: 0.85rem;
        padding: 8px 12px;
      }
    }
  </style>
</head>

<body>

  <!-- Barre fixe avec logo + contrôles musique -->
  <div class="topbar">
    <img class="logo" src="hqentete.png" alt="Hero Quest" onclick="goHome()">
    <div class="controls">
      <button class="btn-home" onclick="goHome()">🏠 Accueil</button>
      <button class="btn-play" onclick="lancerImmersion()">🎲 Lancer l'immersion</button>
      <button class="btn-stop" onclick="stopImmersion()">⏹ Stop</button>
    </div>
  </div>

  <!-- Toutes les pages chargent ici — la musique ne s'arrête jamais -->
  <iframe id="frame" src="accueil.html"></iframe>

  <script>
    const AMBIANCE_FILE = "ambiance1.mp3";
    let ambianceAudio = null;

    function lancerImmersion() {
      if (ambianceAudio) {
        ambianceAudio.pause();
        ambianceAudio.currentTime = 0;
      }
      ambianceAudio = new Audio(AMBIANCE_FILE);
      ambianceAudio.loop = true;
      ambianceAudio.volume = 0.8;
      ambianceAudio.play().catch(() => {});
    }

    function stopImmersion() {
      if (ambianceAudio) {
        ambianceAudio.pause();
        ambianceAudio.currentTime = 0;
      }
    }

    function goHome() {
      document.getElementById("frame").src = "accueil.html";
    }

    // Les pages dans l'iframe appellent cette fonction pour naviguer
    // sans quitter index.html
    function navigateTo(page) {
      document.getElementById("frame").src = page;
    }

    // Les pages dans l'iframe appellent ça pour arrêter la musique
    // (ex: quand un son de porte joue)
    function stopAmbianceFromFrame() {
      stopImmersion();
    }
  </script>

</body>
</html>
