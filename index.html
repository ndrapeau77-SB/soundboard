<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="hq_icon.png">
  <link rel="apple-touch-icon" href="hq_icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000">
  <title>Hero Quest Soundboard</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(0,0,0,0.75);
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar img.logo {
      height: 48px;
      cursor: pointer;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    .btn-home     { background: rgba(255,255,255,0.15); }
    .btn-immersion{ background: #1db954; }
    .btn-heros    { background: #3b82f6; }
    .btn-zargon   { background: #dc2626; }
    .btn-death    { background: #6b0000; }
    .btn-stop     { background: rgba(180,0,0,0.8); }

    button:active { transform: scale(0.95); }

    #frame {
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: calc(100vh - 70px);
      border: none;
      background: transparent;
    }
  </style>
</head>

<body>

<div class="topbar">
  <img class="logo" src="hqentete.png" onclick="goHome()">

  <div class="controls">
    <button class="btn-home"      onclick="goHome()">🏠</button>
    <button class="btn-immersion" onclick="lancerImmersion()">🎵</button>
    <button class="btn-heros"     onclick="toggleHerosMusic()">⚔️</button>
    <button class="btn-zargon"    onclick="toggleZargonMusic()">👿</button>
    <button class="btn-death"     onclick="playDeath()">☠️</button>
    <button class="btn-stop"      onclick="stopAll()">⏹</button>
  </div>
</div>

<iframe id="frame" src="accueil.html"></iframe>

<script>
// Variables centralisées — jamais via window["ref"]
let ambianceAudio = null;
let herosAudio    = null;
let zargonAudio   = null;
let deathAudio    = null;

let ambianceTime = 0;
let musicVolume  = 0.8;

const HEROS_TRACKS = [
  "muz_heros1.mp3","muz_heros2.mp3","muz_heros3.mp3",
  "muz_heros4.mp3","muz_heros5.mp3","muz_heros6.mp3",
  "muz_heros7.mp3","muz_heros8.mp3"
];

const ZARGON_TRACKS = [
  "war_drums.mp3"
];

/* ── Ducking API ── */
function getMusicVolume() { return musicVolume; }

function setMusicVolume(vol) {
  musicVolume = Math.min(1, Math.max(0, vol));
  if (ambianceAudio) ambianceAudio.volume = musicVolume;
  if (herosAudio)    herosAudio.volume    = musicVolume;
  if (zargonAudio)   zargonAudio.volume   = musicVolume;
}

/* ── Lecture musique ── */
function playLoop(getAudioRef, setAudioRef, tracks) {
  // Toggle off si déjà en lecture
  if (getAudioRef()) {
    getAudioRef().pause();
    setAudioRef(null);
    return;
  }

  stopAll();

  let index = Math.floor(Math.random() * tracks.length);

  function playNext() {
    const audio = new Audio(tracks[index]);
    setAudioRef(audio);
    audio.volume = musicVolume;

    if (tracks.length === 1) {
      audio.loop = true;
      audio.play().catch(()=>{});
    } else {
      audio.onended = () => {
        index = (index + 1) % tracks.length;
        playNext();
      };
      audio.play().catch(()=>{});
    }
  }

  playNext();
}

function toggleHerosMusic() {
  playLoop(
    () => herosAudio,
    (a) => { herosAudio = a; },
    HEROS_TRACKS
  );
}

function toggleZargonMusic() {
  playLoop(
    () => zargonAudio,
    (a) => { zargonAudio = a; },
    ZARGON_TRACKS
  );
}

function lancerImmersion() {
  stopAll();
  ambianceAudio = new Audio("ambiance1.mp3");
  ambianceAudio.loop = true;
  ambianceAudio.currentTime = ambianceTime || 0;
  ambianceAudio.volume = musicVolume;
  ambianceAudio.play().catch(()=>{});
}

function playDeath() {
  stopAll();
  deathAudio = new Audio("mort.mp3");
  deathAudio.play().catch(()=>{});
}

function stopAll() {
  musicVolume = 0.8;

  if (ambianceAudio) {
    ambianceTime = ambianceAudio.currentTime;
    ambianceAudio.pause();
    ambianceAudio = null;
  }
  if (herosAudio)  { herosAudio.pause();  herosAudio  = null; }
  if (zargonAudio) { zargonAudio.pause(); zargonAudio = null; }
  if (deathAudio)  { deathAudio.pause();  deathAudio  = null; }

  // Stoppe aussi les sons locaux dans l'iframe active
  try {
    const frame = document.getElementById("frame");
    if (frame && frame.contentWindow && frame.contentWindow.stopAllLocal) {
      frame.contentWindow.stopAllLocal();
    }
  } catch(e) {}
}

function goHome() {
  document.getElementById("frame").src = "accueil.html";
}

function navigateTo(page) {
  document.getElementById("frame").src = page;
}

function stopAmbianceFromFrame() {
  stopAll();
}
</script>

</body>
</html>
