<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hero Quest Soundboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;

      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
        url('heroquestbackground.jpg');

      background-size: cover;
      background-position: center;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
    }

    .sound-btn {
      position: relative;
      height: 120px;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      border: none;
      padding: 0;
      background: none;
    }

    .sound-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.7);
    }

    .sound-btn span {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      font-weight: bold;
      font-size: 0.9rem;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    .sound-btn:active {
      transform: scale(0.96);
    }

  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <h1>Hero Quest 🔊</h1>
      <p>Appuie sur une créature</p>
    </div>

    <div class="grid">

      <button class="sound-btn" onclick="playSound('porte')">
        <img src="porte.png">
        <span>Porte 🚪</span>
      </button>

      <button class="sound-btn" onclick="playSound('rat')">
        <img src="rat.png">
        <span>Rat</span>
      </button>

      <button class="sound-btn" onclick="playSound('squelette')">
        <img src="squelette.png">
        <span>Squelette</span>
      </button>

      <button class="sound-btn" onclick="playSound('zombie')">
        <img src="zombie.png">
        <span>Zombie</span>
      </button>

      <button class="sound-btn" onclick="playSound('momie')">
        <img src="momie.png">
        <span>Momie</span>
      </button>

      <button class="sound-btn" onclick="playSound('gobelin')">
        <img src="gobelin.png">
        <span>Gobelin</span>
      </button>

      <button class="sound-btn" onclick="playSound('ogre')">
        <img src="ogre.png">
        <span>Ogre</span>
      </button>

      <button class="sound-btn" onclick="playSound('abomination')">
        <img src="abomination.png">
        <span>Abomination</span>
      </button>

      <button class="sound-btn" onclick="playSound('gargouille')">
        <img src="gargouille.png">
        <span>Gargouille</span>
      </button>

      <button class="sound-btn" onclick="playSound('dreadwarrior')">
        <img src="dreadwarrior.png">
        <span>Dread Warrior</span>
      </button>

      <button class="sound-btn" onclick="playSound('dragon')">
        <img src="dragon.png">
        <span>Dragon 🐉</span>
      </button>

    </div>
  </div>

  <!-- Sons -->
  <audio id="porte" src="porte.mp3" preload="auto"></audio>
  <audio id="rat" src="rat.mp3" preload="auto"></audio>
  <audio id="squelette" src="squelette.mp3" preload="auto"></audio>
  <audio id="zombie" src="zombie.mp3" preload="auto"></audio>
  <audio id="momie" src="momie.mp3" preload="auto"></audio>
  <audio id="gobelin" src="gobelin.mp3" preload="auto"></audio>
  <audio id="ogre" src="ogre.mp3" preload="auto"></audio>
  <audio id="abomination" src="abomination.mp3" preload="auto"></audio>
  <audio id="gargouille" src="gargouille.mp3" preload="auto"></audio>
  <audio id="dreadwarrior" src="dreadwarrior.mp3" preload="auto"></audio>
  <audio id="dragon" src="dragon.mp3" preload="auto"></audio>

  <script>
    function playSound(id) {
      const sound = document.getElementById(id);
      if (!sound) return;

      sound.currentTime = 0;
      sound.play().catch(()=>{});
    }
  </script>
</body>
</html>
