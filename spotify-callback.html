<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion Spotify</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }

    .card {
      width: min(92vw, 520px);
      background: rgba(0,0,0,0.55);
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      font-size: 1.6rem;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 12px;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Connexion Spotify en cours...</h1>
    <pre id="status">Patiente un instant...</pre>
  </div>

  <script>
    const clientId = "a0be0072df274f70ab0c1ab08a66b890";
    const redirectUri = "https://ndrapeau77-sb.github.io/soundboard/spotify-callback.html";
    const statusEl = document.getElementById("status");

    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const error = params.get("error");
    const codeVerifier = localStorage.getItem("code_verifier");

    function setStatus(message) {
      if (typeof message === "string") {
        statusEl.textContent = message;
      } else {
        statusEl.textContent = JSON.stringify(message, null, 2);
      }
    }

    async function getToken() {
      if (error) {
        setStatus("Erreur Spotify : " + error);
        return;
      }

      if (!code) {
        setStatus("Erreur : aucun code Spotify reçu.");
        return;
      }

      if (!codeVerifier) {
        setStatus("Erreur : code_verifier manquant. Recommence depuis spotify-login.html");
        return;
      }

      try {
        const response = await fetch("https://accounts.spotify.com/api/token", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: new URLSearchParams({
            client_id: clientId,
            grant_type: "authorization_code",
            code,
            redirect_uri: redirectUri,
            code_verifier: codeVerifier
          })
        });

        const data = await response.json();

        if (!response.ok) {
          setStatus(data);
          return;
        }

        if (!data.access_token) {
          setStatus("Erreur : aucun access_token reçu.");
          return;
        }

        localStorage.setItem("access_token", data.access_token);

        if (data.refresh_token) {
          localStorage.setItem("refresh_token", data.refresh_token);
        }

        if (data.expires_in) {
          localStorage.setItem("token_expires_at", String(Date.now() + (data.expires_in * 1000)));
        }

        localStorage.removeItem("code_verifier");

        setStatus("Connexion réussie ✅\nRedirection vers le contrôle Spotify...");

        setTimeout(() => {
          window.location.href = "spotify-control.html";
        }, 1200);

      } catch (err) {
        setStatus("Erreur réseau : " + err.message);
      }
    }

    getToken();
  </script>

</body>
</html>
