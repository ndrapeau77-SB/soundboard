<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion Spotify</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.8)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
    }
    .card {
      width: min(92vw, 440px);
      background: rgba(0,0,0,0.6);
      border-radius: 18px;
      padding: 28px 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }
    h1 { margin-top: 0; font-size: 1.6rem; }
    #msg { color: #ddd; line-height: 1.6; font-size: 1rem; }
    .spinner {
      margin: 20px auto;
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #1db954;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: none;
      margin-top: 16px;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: #1db954;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion Spotify</h1>
    <div class="spinner" id="spinner"></div>
    <p id="msg">Échange du token en cours...</p>
    <button class="btn" id="retryBtn" onclick="location.href='spotify-login.html'">Réessayer</button>
  </div>

  <script>
    const CLIENT_ID    = "a0be0072df274f70ab0c1ab08a66b890";
    const REDIRECT_URI = "https://ndrapeau77-sb.github.io/soundboard/spotify-callback.html";

    const msgEl     = document.getElementById("msg");
    const spinner   = document.getElementById("spinner");
    const retryBtn  = document.getElementById("retryBtn");

    function showError(text) {
      spinner.style.display = "none";
      msgEl.textContent = "❌ " + text;
      retryBtn.style.display = "block";
    }

    async function run() {
      const params   = new URLSearchParams(location.search);
      const code     = params.get("code");
      const error    = params.get("error");
      const verifier = localStorage.getItem("pkce_verifier");

      if (error)    return showError("Spotify a refusé la connexion : " + error);
      if (!code)    return showError("Aucun code reçu de Spotify.");
      if (!verifier) return showError("Verifier manquant — recommence depuis le début.");

      try {
        const res = await fetch("https://accounts.spotify.com/api/token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            grant_type:    "authorization_code",
            client_id:     CLIENT_ID,
            code,
            redirect_uri:  REDIRECT_URI,
            code_verifier: verifier,
          }),
        });

        const data = await res.json();

        if (!res.ok || !data.access_token) {
          return showError("Erreur Spotify : " + (data.error_description || data.error || res.status));
        }

        // Sauvegarde token + refresh token + expiry
        localStorage.setItem("sp_access",   data.access_token);
        localStorage.setItem("sp_refresh",  data.refresh_token || "");
        localStorage.setItem("sp_expires",  String(Date.now() + data.expires_in * 1000));
        localStorage.removeItem("pkce_verifier");

        msgEl.textContent = "✅ Connexion réussie ! Retour à l'app...";
        spinner.style.display = "none";

        setTimeout(() => location.href = "heros.html", 1200);

      } catch(e) {
        showError("Erreur réseau : " + e.message);
      }
    }

    run();
  </script>
</body>
</html>
