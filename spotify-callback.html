<!DOCTYPE html>
<html>
<head>
  <title>Callback</title>
</head>
<body>

<script>
const clientId = "a0be0072df274f70ab0c1ab08a66b890";
const redirectUri = "https://ndrapeau77-sb.github.io/soundboard/spotify-callback.html";

const params = new URLSearchParams(window.location.search);
const code = params.get("code");
const codeVerifier = localStorage.getItem("code_verifier");

async function getToken() {
  if (!code) {
    document.body.innerHTML = "<p>Erreur : aucun code Spotify reçu.</p>";
    return;
  }

  if (!codeVerifier) {
    document.body.innerHTML = "<p>Erreur : code_verifier manquant. Recommence depuis spotify-login.html.</p>";
    return;
  }

  try {
    const response = await fetch("https://accounts.spotify.com/api/token", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: new URLSearchParams({
        client_id: clientId,
        grant_type: "authorization_code",
        code: code,
        redirect_uri: redirectUri,
        code_verifier: codeVerifier
      })
    });

    const data = await response.json();

    if (!response.ok) {
      document.body.innerHTML = "<p>Erreur token Spotify : " + JSON.stringify(data) + "</p>";
      return;
    }

    localStorage.setItem("access_token", data.access_token);

    if (data.refresh_token) {
      localStorage.setItem("refresh_token", data.refresh_token);
    }

    window.location.href = "spotify-control.html";
  } catch (error) {
    document.body.innerHTML = "<p>Erreur réseau : " + error.message + "</p>";
  }
}

getToken();
</script>

</body>
</html>
