<!DOCTYPE html>
<html>
<head>
  <title>Callback</title>
</head>
<body>

<pre id="status">Connexion Spotify en cours...</pre>

<script>
const clientId = "a0be0072df274f70ab0c1ab08a66b890";
const redirectUri = "https://ndrapeau77-sb.github.io/soundboard/spotify-callback.html";
const statusEl = document.getElementById("status");

const params = new URLSearchParams(window.location.search);
const code = params.get("code");
const codeVerifier = localStorage.getItem("code_verifier");

async function getToken() {
  if (!code) {
    statusEl.textContent = "Erreur : aucun code Spotify reçu.";
    return;
  }

  if (!codeVerifier) {
    statusEl.textContent = "Erreur : code_verifier manquant. Recommence depuis spotify-login.html";
    return;
  }

  try {
    const response = await fetch("https://accounts.spotify.com/api/token", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: new URLSearchParams({
        client_id: clientId,
        grant_type: "authorization_code",
        code: code,
        redirect_uri: redirectUri,
        code_verifier: codeVerifier
      })
    });

    const data = await response.json();
    statusEl.textContent = JSON.stringify(data, null, 2);

    if (!response.ok) {
      return;
    }

    if (!data.access_token) {
      statusEl.textContent = "Erreur : aucun access_token reçu.\n\n" + JSON.stringify(data, null, 2);
      return;
    }

    localStorage.setItem("access_token", data.access_token);

    if (data.refresh_token) {
      localStorage.setItem("refresh_token", data.refresh_token);
    }

    setTimeout(() => {
      window.location.href = "spotify-control.html";
    }, 2000);

  } catch (error) {
    statusEl.textContent = "Erreur réseau : " + error.message;
  }
}

getToken();
</script>

</body>
</html>
