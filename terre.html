<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magie - Terre</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(5, 10, 20, 0.55), rgba(5, 10, 20, 0.75)),
        url("images/heroquestbackground.jpg") center/cover no-repeat fixed;
    }

    .app {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    .back-btn {
      background: rgba(20, 30, 50, 0.85);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    .grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}

/* Bouton */
.sound-btn {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.35);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  height: 230px; /* 🔥 taille parfaite */
  background: rgba(0,0,0,0.25);
}

/* Hover */
.sound-btn:hover {
  transform: scale(1.02);
  box-shadow: 0 14px 30px rgba(0,0,0,0.45);
}

/* Image plein format */
.sound-btn img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Texte overlay */
.sound-btn span {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100%;
  padding: 12px;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
  color: white;
  background: rgba(0,0,0,0.6);
  text-shadow: 0 2px 6px rgba(0,0,0,0.8);
  z-index: 2;
}

/* Mobile */
@media (max-width: 700px) {
  .grid {
    gap: 14px;
  }

  .sound-btn {
    height: 170px;
  }

  .sound-btn span {
    font-size: 16px;
  }
}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Terre</h1>
      <button class="back-btn" onclick="window.location.href='magies.html'">⬅ Retour</button>
    </div>

    <div class="grid">
      <div class="sound-btn" onclick="playAudioById('terre-pass')">
        <img src="spell_passrock.png" alt="Pass Through Rock">
        <span>Pass Through Rock</span>
      </div>

      <div class="sound-btn" onclick="playAudioById('terre-healing')">
        <img src="spell_healbody.png" alt="Heal Body">
        <span>Heal Body</span>
      </div>

      <div class="sound-btn" onclick="playAudioById('terre-rockskin')">
        <img src="spell_rockskin.png" alt="Rock Skin">
        <span>Rock Skin</span>
      </div>
    </div>
  </div>

  <audio id="terre-pass" preload="auto">
    <source src="https://ndrapeau77-sb.github.io/soundboard/terre_pass.mp3" type="audio/mpeg">
  </audio>

  <audio id="terre-healing" preload="auto">
    <source src="https://ndrapeau77-sb.github.io/soundboard/terre_healing.mp3" type="audio/mpeg">
  </audio>

  <audio id="terre-rockskin" preload="auto">
    <source src="https://ndrapeau77-sb.github.io/soundboard/terre_rockskin.mp3" type="audio/mpeg">
  </audio>

  <script>
    let currentAudio = null;

    function playAudioById(audioId) {
      const audio = document.getElementById(audioId);

      if (!audio) {
        alert("Audio introuvable : " + audioId);
        return;
      }

      if (currentAudio && currentAudio !== audio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      audio.currentTime = 0;
      currentAudio = audio;

      audio.play().catch((error) => {
        console.error("Erreur audio :", error);
        alert("Le son ne charge pas.");
      });
    }
  </script>
</body>
</html>
