<script>
  const soundFiles = {
    porte: "porte.mp3",
    rat: "rat.mp3",
    squelette: "squelette.mp3",
    zombie: "zombie.mp3",
    momie: "momie.mp3",
    gobelin: "gobelin.mp3",
    ogre: "ogre.mp3",
    abomination: "abomination.mp3",
    gargouille: "gargouille.mp3",
    dreadwarrior: "dreadwarrior.mp3",
    dragon: "dragon.mp3"
  };

  function playSound(id) {
    const file = soundFiles[id];
    if (!file) return;

    const sound = new Audio(file);
    sound.preload = "auto";
    sound.volume = 1.0;
    sound.muted = false;
    sound.setAttribute("playsinline", "");

    const playPromise = sound.play();
    if (playPromise !== undefined) {
      playPromise.catch((error) => {
        console.log("Lecture bloquée ou interrompue :", error);
      });
    }
  }
</script>
