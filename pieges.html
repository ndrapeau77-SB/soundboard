<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pièges</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background: transparent;
    }
    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      justify-items: center;
    }
    .btn {
      width: 100%;
      max-width: 220px;
      height: 260px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      border: none;
      padding: 0;
      background: transparent;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: box-shadow 0.15s ease;
    }
    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .btn span {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      font-weight: bold;
      font-size: 18px;
      color: white;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      text-shadow: 2px 2px 6px rgba(0,0,0,1);
    }
    /* Bouton actif pendant la lecture */
    .btn.playing {
      box-shadow: 0 0 0 3px #f97316, 0 10px 25px rgba(0,0,0,0.4);
    }
    .btn:active { transform: scale(0.97); }

    .back-btn {
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }
    .back-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Pièges ☠️</h1>
      <button class="back-btn" onclick="parent.navigateTo('heros.html')">← Retour</button>
    </div>
    <div class="grid">

      <button class="btn" id="btn-fleche" onclick="playSound('fleche', this)">
        <img src="piegefleche.png">
        <span>Flèche</span>
      </button>

      <button class="btn" id="btn-lance" onclick="playSound('lance', this)">
        <img src="piegelance.png">
        <span>Lance</span>
      </button>

      <button class="btn" id="btn-eboulis" onclick="playSound('eboulis', this)">
        <img src="piegeeboulis.png">
        <span>Éboulis</span>
      </button>

      <button class="btn" id="btn-oubliette" onclick="playSound('oubliette', this)">
        <img src="piegeoubliette.png">
        <span>Oubliette</span>
      </button>

      <button class="btn" id="btn-coffre" onclick="playSound('coffre', this)">
        <img src="piegecoffre.png">
        <span>Coffre</span>
      </button>

    </div>
  </div>

  <script>
    const soundFiles = {
      fleche:    "many_arrows.mp3",
      lance:     "piege_lance.mp3",
      eboulis:   "eboulements.mp3",
      oubliette: "piegeoubliette.mp3",
      coffre:    "piegecoffre.mp3"
    };

    let currentAudio = null;
    let activeBtn    = null;
    let duckTimeout  = null;

    const DUCK_VOLUME   = 0.15;
    const NORMAL_VOLUME = 0.8;
    const FADE_STEPS    = 20;
    const FADE_MS       = 200;

    // ── Ducking parent ────────────────────────────────────
    function duckParent(targetVolume, durationMs) {
      if (!parent || !parent.setMusicVolume) return;
      const steps    = FADE_STEPS;
      const interval = durationMs / steps;
      const current  = parent.getMusicVolume ? parent.getMusicVolume() : NORMAL_VOLUME;
      const delta    = (targetVolume - current) / steps;
      let step = 0;
      const timer = setInterval(() => {
        step++;
        const vol = Math.min(1, Math.max(0, current + delta * step));
        parent.setMusicVolume(vol);
        if (step >= steps) clearInterval(timer);
      }, interval);
    }

    function restoreParent() {
      clearTimeout(duckTimeout);
      duckParent(NORMAL_VOLUME, FADE_MS * 2);
    }

    // ── Gestion bouton actif ──────────────────────────────
    function clearActiveBtn() {
      if (activeBtn) {
        activeBtn.classList.remove("playing");
        activeBtn = null;
      }
    }

    // ── Lecture son ───────────────────────────────────────
    function playSound(id, btn) {
      const file = soundFiles[id];
      if (!file) return;

      // Stoppe le son en cours
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
      clearActiveBtn();
      clearTimeout(duckTimeout);

      // Duck la musique du parent
      duckParent(DUCK_VOLUME, FADE_MS);

      currentAudio = new Audio(file);
      currentAudio.volume = 1;

      currentAudio.onended = () => {
        currentAudio = null;
        clearActiveBtn();
        restoreParent();
      };

      currentAudio.play().catch(() => {});

      activeBtn = btn;
      btn.classList.add("playing");

      // Sécurité : restore après 15s si onended ne se déclenche pas
      duckTimeout = setTimeout(() => {
        restoreParent();
        clearActiveBtn();
      }, 15000);
    }

    /* Appelée par index.html via stopAll() */
    function stopAllLocal() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
      clearActiveBtn();
      clearTimeout(duckTimeout);
    }
  </script>
</body>
</html>
