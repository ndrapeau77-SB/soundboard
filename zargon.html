<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zargon - Hero Quest</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
        url('heroquestbackground.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px 16px 40px;
      text-align: center;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .back-btn {
      text-decoration: none;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .zargon-card {
      margin-top: 20px;
    }

    .zargon-card img {
      width: 100%;
      max-width: 350px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .play-btn {
      margin-top: 20px;
      background: #dc2626;
      color: white;
      border: none;
      padding: 16px 22px;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
      transition: transform 0.1s ease, opacity 0.2s ease;
    }

    .play-btn:active {
      transform: scale(0.95);
    }

    .play-btn.playing {
      opacity: 0.85;
    }

    .hint {
      margin-top: 12px;
      font-size: 0.95rem;
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Zargon 😈</h1>
      <a class="back-btn" href="index.html">← Retour</a>
    </div>

    <div class="zargon-card">
      <img src="combat_intro.png" alt="Combat Intro">
    </div>

    <button id="combatBtn" class="play-btn" onclick="toggleCombatSound()">
      ⚔️ Début du combat
    </button>

    <div class="hint">
      À la fin du son, tentative de retour vers Spotify.
    </div>

  </div>

  <script>
    const SPOTIFY_URI = "spotify:playlist:6FohP6m1ipvNjgllOH4HLt";
    const SPOTIFY_WEB = "https://open.spotify.com/playlist/6FohP6m1ipvNjgllOH4HLt";

    let combatSound = null;
    let isPlaying = false;
    let spotifyReturnTimer = null;

    function relaunchSpotify() {
      // tente d'ouvrir l'app Spotify
      window.location.href = SPOTIFY_URI;

      // fallback web si l'app n'ouvre pas
      setTimeout(() => {
        window.location.href = SPOTIFY_WEB;
      }, 500);
    }

    function toggleCombatSound() {
      const btn = document.getElementById("combatBtn");

      if (!combatSound) {
        combatSound = new Audio("combat_intro.mp3");
        combatSound.preload = "auto";

        combatSound.onended = () => {
          isPlaying = false;
          btn.classList.remove("playing");
          btn.textContent = "⚔️ Début du combat";

          // tente de relancer Spotify quand le son finit
          relaunchSpotify();
        };
      }

      if (!isPlaying) {
        if (spotifyReturnTimer) {
          clearTimeout(spotifyReturnTimer);
          spotifyReturnTimer = null;
        }

        combatSound.currentTime = 0;
        combatSound.play().catch(() => {});
        isPlaying = true;
        btn.classList.add("playing");
        btn.textContent = "⏹️ Arrêter le combat";
      } else {
        combatSound.pause();
        combatSound.currentTime = 0;
        isPlaying = false;
        btn.classList.remove("playing");
        btn.textContent = "⚔️ Début du combat";

        // option 2: si tu arrêtes manuellement, on peut aussi renvoyer vers Spotify
        relaunchSpotify();
      }
    }
  </script>

</body>
</html>
