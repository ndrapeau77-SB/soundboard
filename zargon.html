<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zargon</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(5, 10, 20, 0.55), rgba(5, 10, 20, 0.75)),
        url("heroquestbackground.jpg") center/cover no-repeat fixed;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 32px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    .top-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-top {
      background: rgba(255,120,0,0.85);
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-back {
      background: rgba(0,0,0,0.6);
    }

    /* 🔥 GRID IDENTIQUE À MAGIES */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
      justify-items: center;
    }

    /* 🔥 NOUVEAU STYLE MAGIES */
    .img-btn {
      position: relative;
      display: block;
      width: 100%;
      max-width: 320px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      border: 2px solid rgba(255,255,255,0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      min-height: 240px;
      background: rgba(0,0,0,0.25);
      cursor: pointer;
    }

    .img-btn:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 14px 30px rgba(0,0,0,0.45);
    }

    .img-btn:active {
      transform: scale(0.97);
    }

    .img-btn img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }

    .img-btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.18));
      text-shadow: 0 2px 6px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    @media (max-width: 700px) {
      .grid {
        gap: 16px;
      }

      .img-btn {
        max-width: 100%;
        min-height: 190px;
      }

      .img-btn img {
        height: 190px;
      }

      .img-btn span {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Zargon 💀</h1>
      <div class="top-buttons">
        <button class="btn-top" onclick="startTurn()">🔥 Début du tour</button>
        <button class="btn-top btn-back" onclick="parent.navigateTo('accueil.html')">← Retour</button>
      </div>
    </div>

    <div class="grid">

      <button class="img-btn" onclick="parent.navigateTo('monstres.html')">
        <img src="monstres.png">
        <span>Monstres</span>
      </button>

      <button class="img-btn" onclick="parent.navigateTo('sortdelaterreur.html')">
        <img src="sortdelaterreur.png">
        <span>Sorts de la terreur</span>
      </button>

      <button class="img-btn" onclick="playAttackDice()">
        <img src="des_att_zargon.png">
        <span>Dés Attaque</span>
      </button>

      <button class="img-btn" onclick="playDefenseDice()">
        <img src="des_def_zargon.png">
        <span>Dés Défense</span>
      </button>

    </div>

  </div>

  <script src="audio-utils.js"></script>
  <!-- TON JS RESTE IDENTIQUE -->
</body>
</html>
