<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zargon</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
        url('heroquestbackground.jpg');
      background-size: cover;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
    }

    .topbar a {
      color: white;
      text-decoration: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .btn {
      width: 100%;
      max-width: 220px;
      height: 260px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: rgba(0,0,0,0.4);
    }

    .btn span {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 12px;
      text-align: center;
      background: rgba(0,0,0,0.8);
      font-weight: bold;
    }
  </style>
</head>

<body>
<div class="app">

  <div class="topbar">
    <h1>Zargon</h1>
    <a href="index.html">← Retour</a>
  </div>

  <div class="grid">

    <a class="btn" href="monstres.html">
      <img src="monstres.png">
      <span>Monstres 👹</span>
    </a>

    <a class="btn" href="sortdelaterreur.html">
      <img src="sortdelaterreur.png">
      <span>Sorts de la terreur</span>
    </a>

  </div>

</div>
</body>
</html>
