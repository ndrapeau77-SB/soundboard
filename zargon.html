<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zargon</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background: transparent;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 15px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 32px;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .btn {
      display: block;
      width: 100%;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.1s ease;
      background: rgba(0,0,0,0.25);
      border: none;
      padding: 0;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: rgba(0,0,0,0.4);
    }

    .btn span {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      text-align: center;
      background: rgba(0,0,0,0.65);
      font-weight: bold;
      font-size: 18px;
      color: white;
      text-shadow: 2px 2px 6px rgba(0,0,0,1);
      border-radius: 10px;
      white-space: nowrap;
      z-index: 2;
    }

    @media (max-width: 480px) {
      .app {
        padding: 16px;
      }

      .topbar {
        flex-wrap: wrap;
      }

      .topbar h1 {
        font-size: 28px;
      }

      .btn {
        height: 220px;
        max-width: 100%;
      }

      .btn span {
        font-size: 16px;
        padding: 7px 12px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Zargon</h1>
      <button onclick="parent.navigateTo('accueil.html')" style="color:white;background:rgba(0,0,0,0.6);padding:10px 14px;border-radius:10px;font-weight:bold;border:none;cursor:pointer;font-size:1rem;white-space:nowrap;">← Retour</button>
    </div>

    <div class="grid">

      <button class="btn" onclick="parent.navigateTo('monstres.html')">
        <img src="monstres.png" alt="Monstres">
        <span>Monstres</span>
      </button>

      <button class="btn" onclick="parent.navigateTo('sortdelaterreur.html')">
        <img src="sortdelaterreur.png" alt="Sort de la terreur">
        <span>Sorts de la terreur</span>
      </button>

            <!-- 🎲 DÉS ATTAQUE -->
      <button class="btn" onclick="playAttackDice()">
        <img src="des_att_zargon.png" alt="Dés attaque">
        <span>Dés Attaque</span>
      </button>

      <!-- 🛡️ DÉS DÉFENSE -->
      <button class="btn" onclick="playDefenseDice()">
        <img src="des_def_zargon.png" alt="Dés défense">
        <span>Dés Défense</span>
      </button>

      <button class="btn" onclick="playAmbiance()">
      <img src="musique_zargon.png" alt="Combats">
      <span>Musique</span>
    </button>

    </div>

  </div>
</body>
</html>
