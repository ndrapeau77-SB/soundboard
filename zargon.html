<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zargon</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background: transparent;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 15px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 32px;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar-btn {
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      white-space: nowrap;
    }

    .turn-btn {
      background: rgba(255,140,0,0.85);
    }

    .back-btn {
      background: rgba(0,0,0,0.6);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 220px;
      height: 280px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.1s ease;
      background: rgba(0,0,0,0.25);
      border: none;
      padding: 0;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: transparent;
    }

    .btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 1.05rem;
      color: #ffffff;
      background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.25));
      text-shadow: 0 2px 6px rgba(0,0,0,1);
      z-index: 2;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,0.82);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 480px) {
      .app {
        padding: 16px;
      }

      .topbar h1 {
        font-size: 28px;
      }

      .btn {
        height: 220px;
        max-width: 100%;
      }

      .btn span {
        font-size: 16px;
        padding: 7px 12px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Zargon</h1>

      <div class="topbar-actions">
        <button class="topbar-btn turn-btn" onclick="startTurn()">🔥 Début du tour</button>
        <button class="topbar-btn back-btn" onclick="parent.navigateTo('accueil.html')">← Retour</button>
      </div>
    </div>

    <div class="grid">

      <button class="btn" onclick="parent.navigateTo('monstres.html')">
        <img src="monstres.png" alt="Monstres">
        <span>Monstres</span>
      </button>

      <button class="btn" onclick="parent.navigateTo('sortdelaterreur.html')">
        <img src="sortdelaterreur.png" alt="Sorts de la terreur">
        <span>Sorts de la terreur</span>
      </button>

      <button class="btn" onclick="playAttackDice()">
        <img src="des_att_zargon.png" alt="Dés attaque">
        <span>Dés Attaque</span>
      </button>

      <button class="btn" onclick="playDefenseDice()">
        <img src="des_def_zargon.png" alt="Dés défense">
        <span>Dés Défense</span>
      </button>

    </div>

  </div>

  <div id="toast"></div>

  <script>
    const attackSounds = [
      "combat.mp3",
      "combat2.mp3",
      "combat3.mp3",
      "combat4.mp3",
      "combat5.mp3",
      "combat6.mp3"
    ];

    const defenseSounds = [
      "block1.mp3",
      "block2.mp3",
      "block3.mp3",
      "block4.mp3",
      "block5.mp3"
    ];

    const ambianceSounds = [
      "war_horn.mp3"
    ];

    let attackAudio = null;
    let defenseAudio = null;
    let ambianceAudio = null;
    let toastTimer = null;

    let lastAttackIndex = -1;
    let lastDefenseIndex = -1;

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
    }

    function vibrate(pattern) {
      if ("vibrate" in navigator) {
        navigator.vibrate(pattern);
      }
    }

    function startTurn() {
      vibrate(40);
      showToast("🔥 Début du tour !");
    }

    function playAttackDice() {
      vibrate(40);

      let randomIndex;
      do {
        randomIndex = Math.floor(Math.random() * attackSounds.length);
      } while (randomIndex === lastAttackIndex && attackSounds.length > 1);

      lastAttackIndex = randomIndex;

      if (attackAudio) {
        attackAudio.pause();
        attackAudio.currentTime = 0;
      }

      attackAudio = new Audio(attackSounds[randomIndex]);
      attackAudio.preload = "auto";
      attackAudio.volume = 1.0;
      attackAudio.play().catch(() => {});
      showToast("💀 Dés attaque");
    }

    function playDefenseDice() {
      vibrate(30);

      let randomIndex;
      do {
        randomIndex = Math.floor(Math.random() * defenseSounds.length);
      } while (randomIndex === lastDefenseIndex && defenseSounds.length > 1);

      lastDefenseIndex = randomIndex;

      if (defenseAudio) {
        defenseAudio.pause();
        defenseAudio.currentTime = 0;
      }

      defenseAudio = new Audio(defenseSounds[randomIndex]);
      defenseAudio.preload = "auto";
      defenseAudio.volume = 1.0;
      defenseAudio.play().catch(() => {});
      showToast("🛡️ Dés défense");
    }

    function playAmbiance() {
      vibrate(30);

      if (!ambianceSounds.length) {
        showToast("Aucun son configuré.");
        return;
      }

      if (ambianceAudio) {
        ambianceAudio.pause();
        ambianceAudio.currentTime = 0;
      }

      const file = ambianceSounds[Math.floor(Math.random() * ambianceSounds.length)];
      ambianceAudio = new Audio(file);
      ambianceAudio.loop = true;
      ambianceAudio.volume = 0.8;
      ambianceAudio.play().catch(() => {});
      showToast("🎵 Musique lancée");
    }
  </script>
</body>
</html>
