<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zargon</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background: transparent;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 15px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .btn {
      width: 100%;
      max-width: 220px;
      height: 260px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      border: none;
      padding: 0;
      background: transparent;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: transform 0.1s ease;
    }

    .btn:active { transform: scale(0.97); }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .btn span {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      padding: 14px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
      color: white;
      text-shadow: 2px 2px 6px rgba(0,0,0,1);
      background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.45), rgba(0,0,0,0));
      z-index: 2;
    }

    /* 🔥 Nouveau bouton large */
    .btn-wide {
      width: 100%;
      height: 140px;
      border-radius: 18px;
      overflow: hidden;
      margin-top: 25px;
      position: relative;
      border: none;
      cursor: pointer;
      background: transparent;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .btn-wide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn-wide span {
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 12px;
      font-weight: bold;
      font-size: 20px;
      background: rgba(0,0,0,0.7);
    }

    @media (max-width: 480px) {
      .btn { height: 220px; }
      .btn-wide { height: 110px; }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Zargon 💀</h1>
      <button onclick="parent.navigateTo('accueil.html')" style="color:white;background:rgba(0,0,0,0.6);padding:10px 14px;border-radius:10px;font-weight:bold;border:none;cursor:pointer;">← Retour</button>
    </div>

    <div class="grid">

      <button class="btn" onclick="parent.navigateTo('monstres.html')">
        <img src="monstres.png">
        <span>Monstres</span>
      </button>

      <button class="btn" onclick="parent.navigateTo('sortdelaterreur.html')">
        <img src="sortdelaterreur.png">
        <span>Sorts de la terreur</span>
      </button>

      <button class="btn" onclick="playAttackDice()">
        <img src="des_att_zargon.png">
        <span>Dés Attaque</span>
      </button>

      <button class="btn" onclick="playDefenseDice()">
        <img src="des_def_zargon.png">
        <span>Dés Défense</span>
      </button>

      <button class="btn" onclick="playAmbiance()">
        <img src="musique_zargon.png">
        <span>Musique</span>
      </button>

    </div>

    <!-- 🔥 NOUVEAU BOUTON LARGE -->
    <button class="btn-wide" onclick="playDeath()">
      <img src="mort.png">
      <span>💀 Mort</span>
    </button>

  </div>

  <script>
    function playDeath() {
      new Audio("mort.mp3").play().catch(()=>{});
    }
  </script>

</body>
</html>
