<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zargon</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background: transparent;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 32px;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-top {
      background: rgba(255,120,0,0.85);
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn-back {
      background: rgba(0,0,0,0.6);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .btn {
      width: 100%;
      max-width: 220px;
      height: 260px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      border: none;
      padding: 0;
      background: transparent;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: transform 0.1s ease;
      display: block;
    }

    .btn:active { transform: scale(0.97); }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 10px;
      box-sizing: border-box;
      text-align: center;
      font-weight: bold;
      font-size: 1.05rem;
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,1);
      background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.45), rgba(0,0,0,0));
      z-index: 2;
      pointer-events: none;
    }

    .btn-wide {
      width: 100%;
      height: 140px;
      border-radius: 18px;
      overflow: hidden;
      margin-top: 25px;
      position: relative;
      border: none;
      cursor: pointer;
      background: transparent;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: transform 0.1s ease;
      display: block;
    }

    .btn-wide:active { transform: scale(0.97); }

    .btn-wide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .btn-wide span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 10px;
      box-sizing: border-box;
      text-align: center;
      font-weight: bold;
      font-size: 1.1rem;
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,1);
      background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.45), rgba(0,0,0,0));
      z-index: 2;
      pointer-events: none;
    }

    #death-flash {
      position: fixed;
      inset: 0;
      background: rgba(180, 0, 0, 0);
      pointer-events: none;
      z-index: 9999;
      transition: background 0.1s ease;
    }

    #death-flash.show {
      background: rgba(180, 0, 0, 0.5);
    }

    @media (max-width: 480px) {
      .btn { height: 220px; max-width: 100%; }
      .btn-wide { height: 110px; }
      .btn span { font-size: 0.95rem; }
      .topbar h1 { font-size: 28px; }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Zargon 💀</h1>
      <div class="top-buttons">
        <button class="btn-top" onclick="startTurn()">🔥 Début du tour</button>
        <button class="btn-top btn-back" onclick="parent.navigateTo('accueil.html')">← Retour</button>
      </div>
    </div>

    <div class="grid">

      <button class="btn" onclick="parent.navigateTo('monstres.html')">
        <img src="monstres.png" alt="Monstres">
        <span>Monstres</span>
      </button>

      <button class="btn" onclick="parent.navigateTo('sortdelaterreur.html')">
        <img src="sortdelaterreur.png" alt="Sorts de la terreur">
        <span>Sorts de la terreur</span>
      </button>

      <button class="btn" onclick="playAttackDice()">
        <img src="des_att_zargon.png" alt="Dés attaque">
        <span>Dés Attaque</span>
      </button>

      <button class="btn" onclick="playDefenseDice()">
        <img src="des_def_zargon.png" alt="Dés défense">
        <span>Dés Défense</span>
      </button>

    </div>

  </div>

  <div id="death-flash"></div>

  <script src="audio-utils.js"></script>
  <script>
    const attackSounds = [
      "combat.mp3","combat2.mp3","combat3.mp3",
      "combat4.mp3","combat5.mp3","combat6.mp3"
    ];

    const defenseSounds = [
      "block1.mp3","block2.mp3","block3.mp3","block4.mp3","block5.mp3"
    ];

    let attackAudio  = null;
    let defenseAudio = null;
    let deathAudio   = null;
    let turnAudio    = null;

    let lastAttackIndex  = -1;
    let lastDefenseIndex = -1;

    function vibrate(pattern) {
      if ("vibrate" in navigator) navigator.vibrate(pattern);
    }

    async function playShortSound(file, currentAudio, onNewAudio, volume = 1.0) {
      if (currentAudio) {
        currentAudio.onended = null;
        await fadeOut(currentAudio, 120);
      }
      const audio = new Audio(file);
      audio.preload = "auto";
      audio.volume  = 0;
      onNewAudio(audio);
      audio.play()
        .then(() => fadeIn(audio, 180, volume))
        .catch(() => {});
      return audio;
    }

    async function startTurn() {
      vibrate([40, 60, 40]);
      turnAudio = await playShortSound(
        "war_horn.mp3", turnAudio, (a) => { turnAudio = a; }, 1.0
      );
    }

    async function playAttackDice() {
      vibrate(40);
      let idx;
      do { idx = Math.floor(Math.random() * attackSounds.length); }
      while (idx === lastAttackIndex && attackSounds.length > 1);
      lastAttackIndex = idx;
      attackAudio = await playShortSound(
        attackSounds[idx], attackAudio, (a) => { attackAudio = a; }, 1.0
      );
    }

    async function playDefenseDice() {
      vibrate(30);
      let idx;
      do { idx = Math.floor(Math.random() * defenseSounds.length); }
      while (idx === lastDefenseIndex && defenseSounds.length > 1);
      lastDefenseIndex = idx;
      defenseAudio = await playShortSound(
        defenseSounds[idx], defenseAudio, (a) => { defenseAudio = a; }, 1.0
      );
    }

    async function playDeath() {
      vibrate([120, 80, 120]);

      const flash = document.getElementById("death-flash");
      flash.classList.add("show");
      setTimeout(() => {
        flash.classList.remove("show");
        setTimeout(() => {
          flash.classList.add("show");
          setTimeout(() => flash.classList.remove("show"), 120);
        }, 80);
      }, 120);

      deathAudio = await playShortSound(
        "mort.mp3", deathAudio, (a) => { deathAudio = a; }, 1.0
      );
    }
  </script>

</body>
</html>
