<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zargon</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background: transparent;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 32px;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-top {
      background: rgba(255,120,0,0.85);
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-back {
      background: rgba(0,0,0,0.6);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .btn {
      width: 100%;
      max-width: 220px;
      height: 260px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      border: none;
      padding: 0;
      background: transparent;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn span {
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 12px;
      font-weight: bold;
      background: rgba(0,0,0,0.7);
    }

    /* bouton large mort */
    .btn-wide {
      width: 100%;
      height: 140px;
      border-radius: 18px;
      overflow: hidden;
      margin-top: 25px;
      position: relative;
      border: none;
      cursor: pointer;
      background: transparent;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .btn-wide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn-wide span {
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 12px;
      font-weight: bold;
      background: rgba(0,0,0,0.7);
    }

    /* flash */
    #death-flash {
      position: fixed;
      inset: 0;
      background: rgba(180, 0, 0, 0);
      pointer-events: none;
      z-index: 9999;
      transition: background 0.1s ease;
    }

    #death-flash.show {
      background: rgba(180, 0, 0, 0.5);
    }

    @media (max-width: 480px) {
      .btn { height: 220px; }
      .btn-wide { height: 110px; }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- 🔥 TOPBAR -->
    <div class="topbar">
      <h1>Zargon 💀</h1>

      <div class="top-buttons">
        <button class="btn-top" onclick="startTurn()">🔥 Début du tour</button>
        <button class="btn-top btn-back" onclick="parent.navigateTo('accueil.html')">← Retour</button>
      </div>
    </div>

    <!-- GRID -->
    <div class="grid">

      <button class="btn" onclick="parent.navigateTo('monstres.html')">
        <img src="monstres.png">
        <span>Monstres</span>
      </button>

      <button class="btn" onclick="parent.navigateTo('sortdelaterreur.html')">
        <img src="sortdelaterreur.png">
        <span>Sorts de la terreur</span>
      </button>

      <button class="btn" onclick="playAttackDice()">
        <img src="des_att_zargon.png">
        <span>Dés Attaque</span>
      </button>

      <button class="btn" onclick="playDefenseDice()">
        <img src="des_def_zargon.png">
        <span>Dés Défense</span>
      </button>

    </div>

    <!-- 💀 BOUTON MORT -->
    <button class="btn-wide" onclick="playDeath()">
      <img src="mort.png">
      <span>☠️ Mort</span>
    </button>

  </div>

  <div id="death-flash"></div>

  <script>
    let deathAudio = null;
    let turnAudio = null;

    function startTurn() {
      if ("vibrate" in navigator) {
        navigator.vibrate(80);
      }

      if (turnAudio) {
        turnAudio.pause();
        turnAudio.currentTime = 0;
      }

      turnAudio = new Audio("war_horn.mp3");
      turnAudio.play().catch(() => {});
    }

    function playDeath() {

      if ("vibrate" in navigator) {
        navigator.vibrate([120, 80, 120]);
      }

      const flash = document.getElementById("death-flash");

      flash.classList.add("show");

      setTimeout(() => {
        flash.classList.remove("show");

        setTimeout(() => {
          flash.classList.add("show");

          setTimeout(() => {
            flash.classList.remove("show");
          }, 120);

        }, 80);

      }, 120);

      if (deathAudio) {
        deathAudio.pause();
        deathAudio.currentTime = 0;
      }

      deathAudio = new Audio("mort.mp3");
      deathAudio.play().catch(() => {});
    }
  </script>

</body>
</html>
