<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magies</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      background:
        linear-gradient(rgba(5, 10, 20, 0.55), rgba(5, 10, 20, 0.75)),
        url("heroquestbackground.jpg") center/cover no-repeat fixed;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    .back-btn {
      background: rgba(20, 30, 50, 0.85);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
      justify-items: center;
    }

    .img-btn {
      position: relative;
      display: block;
      width: 100%;
      max-width: 320px;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      border: 2px solid rgba(255,255,255,0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      min-height: 240px;
      background: rgba(0,0,0,0.25);
    }

    .img-btn:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 14px 30px rgba(0,0,0,0.45);
    }

    .img-btn img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }

    .img-btn span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.18));
      text-shadow: 0 2px 6px rgba(0,0,0,0.8);
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .img-btn {
        max-width: 100%;
        min-height: 190px;
      }

      .img-btn img {
        height: 190px;
      }

      .img-btn span {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Magie</h1>
      <button class="back-btn" onclick="window.location.href='combats.html'">⬅ Retour</button>
    </div>

    <div class="grid">
      <a class="img-btn" href="air.html">
        <img src="magie_air.png" alt="Air">
        <span>Air</span>
      </a>

      <a class="img-btn" href="eau.html">
        <img src="magie_eau.png" alt="Eau">
        <span>Eau</span>
      </a>

      <a class="img-btn" href="feu.html">
        <img src="magie_feu.png" alt="Feu">
        <span>Feu</span>
      </a>

      <a class="img-btn" href="terre.html">
        <img src="magie_terre.png" alt="Terre">
        <span>Terre</span>
      </a>
    </div>
  </div>
</body>
</html>
