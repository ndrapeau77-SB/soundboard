<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magie</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;

      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.85)),
        url('heroquestbackground.jpg');

      background-size: cover;
      background-position: center;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .btn {
      width: 100%;
      max-width: 220px;
      height: 260px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      border: none;
      padding: 0;
      background: transparent;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: transform 0.1s ease;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .btn span {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 14px;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
      color: white;
      text-shadow: 2px 2px 6px rgba(0,0,0,1);
      background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.3));
    }

    @media (max-width: 480px) {
      .btn {
        height: 220px;
        max-width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Magie ✨</h1>
      <a href="combats.html">← Retour</a>
    </div>

    <div class="grid">

      <!-- 🌊 EAU -->
      <button class="btn" onclick="playSound('magie_eau.mp3')">
        <img src="magie_eau.png" alt="Eau">
        <span>Eau 🌊</span>
      </button>

      <!-- 🔥 FEU -->
      <button class="btn" onclick="playSound('magie_feu.mp3')">
        <img src="magie_feu.png" alt="Feu">
        <span>Feu 🔥</span>
      </button>

      <!-- 🌪️ AIR -->
      <button class="btn" onclick="playSound('magie_air.mp3')">
        <img src="magie_air.png" alt="Air">
        <span>Air 🌪️</span>
      </button>

      <!-- 🌱 TERRE -->
      <button class="btn" onclick="playSound('magie_terre.mp3')">
        <img src="magie_terre.png" alt="Terre">
        <span>Terre 🌱</span>
      </button>

    </div>

  </div>

  <script>
    let currentAudio = null;

    function playSound(file) {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      currentAudio = new Audio(file);
      currentAudio.play().catch(() => {});
    }
  </script>

</body>
</html>
