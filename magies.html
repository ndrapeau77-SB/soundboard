<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magies</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: linear-gradient(180deg, #0f172a, #020617);
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    h2 {
      margin-top: 30px;
      margin-bottom: 10px;
      padding-left: 10px;
      border-left: 4px solid #38bdf8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .btn {
      position: relative;
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.2s;
    }

    .btn img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      display: block;
    }

    .btn span {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 8px;
      background: rgba(0,0,0,0.6);
      font-weight: bold;
      text-align: center;
      font-size: 14px;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #38bdf8;
    }

    .back {
      margin-bottom: 20px;
      cursor: pointer;
      display: inline-block;
      padding: 8px 12px;
      background: #334155;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="back" onclick="history.back()">⬅ Retour</div>

    <h1>Magies</h1>

    <!-- 🌊 EAU -->
    <h2>Eau</h2>
    <div class="grid">
      <div class="btn" onclick="playSound('veil_of_mist.mp3')">
        <img src="spell_veil.png">
        <span>Veil of Mist</span>
      </div>
      <div class="btn" onclick="playSound('water_of_healing.mp3')">
        <img src="spell_waterhealing.png">
        <span>Water of Healing</span>
      </div>
      <div class="btn" onclick="playSound('sleep.mp3')">
        <img src="spell_sleep.png">
        <span>Sleep</span>
      </div>
    </div>

    <!-- 🔥 FEU -->
    <h2>Feu</h2>
    <div class="grid">
      <div class="btn" onclick="playSound('courage.mp3')">
        <img src="spell_courage.png">
        <span>Courage</span>
      </div>
      <div class="btn" onclick="playSound('ball_of_flame.mp3')">
        <img src="spell_ballofflame.png">
        <span>Ball of Flame</span>
      </div>
      <div class="btn" onclick="playSound('fire_of_wrath.mp3')">
        <img src="spell_fireofwrath.png">
        <span>Fire of Wrath</span>
      </div>
    </div>

    <!-- 💨 AIR -->
    <h2>Air</h2>
    <div class="grid">
      <div class="btn" onclick="playSound('swift_wind.mp3')">
        <img src="spell_wind.png">
        <span>Swift Wind</span>
      </div>
      <div class="btn" onclick="playSound('genie.mp3')">
        <img src="spell_genie.png">
        <span>Genie</span>
      </div>
      <div class="btn" onclick="playSound('tempest.mp3')">
        <img src="spell_tempest.png">
        <span>Tempest</span>
      </div>
    </div>

    <!-- 🌍 TERRE -->
    <h2>Terre</h2>
    <div class="grid">
      <div class="btn" onclick="playSound('pass_through_rock.mp3')">
        <img src="spell_passrock.png">
        <span>Pass Through Rock</span>
      </div>
      <div class="btn" onclick="playSound('heal_body.mp3')">
        <img src="spell_healbody.png">
        <span>Heal Body</span>
      </div>
      <div class="btn" onclick="playSound('rock_skin.mp3')">
        <img src="spell_rockskin.png">
        <span>Rock Skin</span>
      </div>
    </div>

  </div>

  <script>
    let currentAudio = null;

    function playSound(file) {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      currentAudio = new Audio("sounds/" + file);
      currentAudio.play();
    }
  </script>

</body>
</html>
